        var data = {"files":[{"path":["/","__w","dqg","dqg","src","core.rs"],"content":"//! Different methods to destroy non-descriptive cores.\n\nuse itertools::Itertools;\nuse std::time::{Duration, Instant};\n\nuse crate::{\n    debug::print_orbits_nauty_style,\n    do_if_some,\n    encoding::{encode_problem, OrbitEncoding},\n    graph::Graph,\n    misc::CoreMetric,\n    permutation::Permutation,\n    quotient::{compute_generators, empty_orbits, generate_orbits, QuotientGraph},\n    sat_solving::solve_mus_kitten,\n    statistics::QuotientStatistics,\n    time, time_assign, Error, Settings,\n};\n\n/// Just give every vertex* in the core a new color.\n/// This breaks the core but changes the original graph.\n///\n/// *Well not really every vertex, but only those\n/// in bigger orbits. We don't need to recolor single vertex orbits.\n#[cfg(not(tarpaulin_include))]\nfn recolor_core(graph: \u0026mut Graph, core: \u0026[OrbitEncoding]) -\u003e Result\u003c(), Error\u003e {\n    for orbit in core {\n        for vertex in orbit.1.iter().skip(1) {\n            graph.recolor(*vertex)?;\n        }\n    }\n\n    Ok(())\n}\n\n#[cfg(not(tarpaulin_include))]\nfn search_with_core_recolor(graph: \u0026mut Graph, settings: \u0026mut Settings) -\u003e Result\u003c(), Error\u003e {\n    let mut generators;\n    let mut orbits;\n    let mut quotient_graph;\n    let mut encoding;\n\n    loop {\n        let start_time = Instant::now();\n        let mut kissat_time = Duration::ZERO;\n        let mut core_size = None;\n\n        time_assign!(nauty_time, generators, compute_generators(graph, settings));\n\n        if generators.is_empty() {\n            if settings.output_orbits {\n                print_orbits_nauty_style(empty_orbits(graph.size()), None);\n            }\n            break;\n        }\n\n        time_assign!(orbit_gen_time, orbits, generate_orbits(\u0026mut generators));\n\n        time!(graph_sort_time, _sorted, graph.sort());\n\n        time_assign!(\n            quotient_gen_time,\n            quotient_graph,\n            QuotientGraph::from_graph_orbits(graph, orbits)\n        );\n        let quotient_size = quotient_graph.quotient_graph.size();\n        let (min_orbit_size, max_orbit_size) = quotient_graph.get_orbit_sizes();\n\n        time_assign!(\n            encoding_time,\n            encoding,\n            encode_problem(\u0026quotient_graph, graph)\n        );\n\n        let descriptive = if let Some((formula, dict)) = encoding {\n            time!(\n                kitten_time,\n                next_core,\n                solve_mus_kitten(formula, \u0026quotient_graph, graph, dict)?\n            );\n            kissat_time = kitten_time;\n\n            if let Some(core) = next_core {\n                core_size = Some(core.1.len());\n                // Break core with recoloring\n                recolor_core(graph, \u0026core.1)?;\n                false\n            } else {\n                //Descriptive\n                true\n            }\n        } else {\n            // Trivially descriptive\n            true\n        };\n\n        let quotient_handling_time = start_time.elapsed();\n        let quotient_stats = QuotientStatistics {\n            quotient_size,\n            core_size,\n            max_orbit_size,\n            min_orbit_size,\n            descriptive: Ok(descriptive),\n            validated: None,\n            quotient_handling_time,\n            kissat_time,\n            orbit_gen_time,\n            quotient_gen_time,\n            encoding_time,\n            orbit_sizes: Default::default(),\n        };\n        do_if_some(settings.get_stats(), |stats| {\n            stats.log_quotient_statistic(quotient_stats);\n            stats.log_nauty_step(nauty_time);\n            stats.log_graph_sorted_step(graph_sort_time);\n            stats.log_iteration();\n        });\n\n        if descriptive {\n            do_if_some(settings.get_stats(), |stats| stats.exhausted = true);\n            if settings.output_orbits {\n                print_orbits_nauty_style(quotient_graph.orbits, None);\n            }\n            break;\n        }\n    }\n\n    do_if_some(settings.get_stats(), |stats| {\n        stats.log_end();\n        stats.save_statistics().unwrap();\n    });\n\n    Ok(())\n}\n\n/// Take the power of generators related to the core.\n/// If a generator becomes the identity, it's removed.\n#[cfg(not(tarpaulin_include))]\nfn power_generators(generators: \u0026mut [(Permutation, usize)], core: \u0026[OrbitEncoding]) {\n    for (generator, n) in generators {\n        if *n == 0 {\n            continue;\n        }\n\n        for (start, orbit) in core {\n            let image = generator.evaluate(start);\n            if let Some(image) = image {\n                if image != *start \u0026\u0026 orbit.contains(\u0026image) {\n                    *n += 1;\n                    break;\n                }\n            }\n        }\n    }\n}\n\n#[cfg(not(tarpaulin_include))]\nfn search_with_core_power_generators(\n    graph: \u0026mut Graph,\n    settings: \u0026mut Settings,\n) -\u003e Result\u003c(), Error\u003e {\n    let mut generators = compute_generators(graph, settings);\n    let mut orig_generators = generators\n        .iter()\n        .cloned()\n        .map(|perm| (perm, 1usize))\n        .collect_vec();\n\n    graph.sort();\n    let mut orbits;\n    let mut quotient_graph;\n    let mut encoding;\n    let mut counter = 0;\n\n    loop {\n        if orig_generators.is_empty() {\n            println!(\"removed all symmetries in {} iterations\", counter);\n            if settings.output_orbits {\n                print_orbits_nauty_style(empty_orbits(graph.size()), None);\n            }\n            return Ok(());\n        }\n\n        orbits = generate_orbits(\u0026mut generators);\n        quotient_graph = QuotientGraph::from_graph_orbits(graph, orbits);\n        encoding = encode_problem(\u0026quotient_graph, graph);\n\n        if let Some((formula, dict)) = encoding {\n            let next_core = solve_mus_kitten(formula, \u0026quotient_graph, graph, dict)?;\n            if let Some(core) = next_core {\n                power_generators(\u0026mut orig_generators, \u0026core.1);\n            } else {\n                println!(\"Descriptive\");\n                break;\n            }\n        } else {\n            println!(\"Trivially descriptive\");\n            break;\n        }\n\n        generators = orig_generators\n            .iter_mut()\n            .map(|(perm, n)| {\n                let power = perm.nth_power_of(*n);\n                if power.is_identity() {\n                    *n = 0;\n                }\n                power\n            })\n            .collect_vec();\n        orig_generators = orig_generators\n            .into_iter()\n            .filter(|(_, n)| *n \u003e 0)\n            .collect();\n\n        counter += 1;\n\n        if counter \u003e 30 {\n            println!(\"Too many iterations.\");\n            break;\n        }\n    }\n\n    if settings.output_orbits {\n        print_orbits_nauty_style(quotient_graph.orbits, None);\n    }\n    println!(\"Took {} iterations\", counter);\n    Ok(())\n}\n\n/// Combine all related generators by composing them in order.\n/// If there is only one generator related, remove it.\nfn merge_generators(generators: Vec\u003cPermutation\u003e, core: \u0026[OrbitEncoding]) -\u003e Vec\u003cPermutation\u003e {\n    let mut next_generators = Vec::new();\n\n    let (involved, mut not_involved) =\n        generators\n            .into_iter()\n            .partition::\u003cVec\u003cPermutation\u003e, _\u003e(|generator| {\n                for (start, orbit) in core {\n                    let image = generator.evaluate(start);\n                    if let Some(image) = image {\n                        if image != *start \u0026\u0026 orbit.contains(\u0026image) {\n                            return true;\n                        }\n                    }\n                }\n                false\n            });\n\n    if involved.len() \u003e 1 {\n        let merged = involved\n            .into_iter()\n            .fold1(|first, second| first.merge(second).unwrap());\n        if let Some(merged) = merged {\n            next_generators.push(merged);\n        }\n    }\n\n    next_generators.append(\u0026mut not_involved);\n\n    next_generators\n}\n\n#[cfg(not(tarpaulin_include))]\nfn search_with_core_merge_generators(\n    graph: \u0026mut Graph,\n    settings: \u0026mut Settings,\n) -\u003e Result\u003c(), Error\u003e {\n    let mut generators = compute_generators(graph, settings);\n    graph.sort();\n    let mut orbits;\n    let mut quotient_graph;\n    let mut encoding;\n    let mut counter = 0;\n\n    loop {\n        if generators.is_empty() {\n            println!(\"removed all symmetries in {} iterations\", counter);\n            if settings.output_orbits {\n                print_orbits_nauty_style(empty_orbits(graph.size()), None);\n            }\n            return Ok(());\n        }\n\n        orbits = generate_orbits(\u0026mut generators);\n        quotient_graph = QuotientGraph::from_graph_orbits(graph, orbits);\n        encoding = encode_problem(\u0026quotient_graph, graph);\n\n        if let Some((formula, dict)) = encoding {\n            let next_core = solve_mus_kitten(formula, \u0026quotient_graph, graph, dict)?;\n            if let Some(core) = next_core {\n                generators = merge_generators(generators, \u0026core.1);\n            } else {\n                println!(\"Descriptive\");\n                break;\n            }\n        } else {\n            println!(\"Trivially descriptive\");\n            break;\n        }\n\n        counter += 1;\n    }\n\n    if settings.output_orbits {\n        print_orbits_nauty_style(quotient_graph.orbits, None);\n    }\n    println!(\"Took {} iterations\", counter);\n    Ok(())\n}\n\n#[cfg(not(tarpaulin_include))]\npub fn search_with_core(graph: \u0026mut Graph, settings: \u0026mut Settings) -\u003e Result\u003c(), Error\u003e {\n    match settings.nondescriptive_core {\n        Some(CoreMetric::Recolor) =\u003e search_with_core_recolor(graph, settings),\n        Some(CoreMetric::PowerGenerators) =\u003e search_with_core_power_generators(graph, settings),\n        Some(CoreMetric::MergeGenerators) =\u003e search_with_core_merge_generators(graph, settings),\n        _ =\u003e unreachable!(),\n    }\n}\n\n#[cfg(test)]\nmod test {\n    use super::*;\n\n    #[test]\n    fn test_merge_generators() {\n        let generators = vec![\n            Permutation::new(vec![0, 1, 2, 3, 5, 4]),\n            Permutation::new(vec![0, 2, 1, 3, 4, 5]),\n            Permutation::new(vec![0, 2, 1, 4, 3, 5]),\n            Permutation::new(vec![0, 5, 2, 4, 3, 1]),\n        ];\n        let core = vec![(3, vec![3, 4])];\n\n        let expected = vec![\n            Permutation::new(vec![0, 2, 5, 3, 4, 1]),\n            Permutation::new(vec![0, 1, 2, 3, 5, 4]),\n            Permutation::new(vec![0, 2, 1, 3, 4, 5]),\n        ];\n        let merged = merge_generators(generators, \u0026core);\n        assert_eq!(expected, merged);\n\n        let generators = vec![\n            Permutation::new(vec![0, 1, 2, 3, 5, 4]),\n            Permutation::new(vec![0, 2, 1, 3, 4, 5]),\n            Permutation::new(vec![0, 2, 1, 4, 3, 5]),\n            Permutation::new(vec![0, 5, 3, 2, 4, 1]),\n        ];\n        let core = vec![(3, vec![3, 4])];\n\n        let expected = vec![\n            Permutation::new(vec![0, 1, 2, 3, 5, 4]),\n            Permutation::new(vec![0, 2, 1, 3, 4, 5]),\n            Permutation::new(vec![0, 5, 3, 2, 4, 1]),\n        ];\n        let merged = merge_generators(generators, \u0026core);\n        assert_eq!(expected, merged);\n    }\n}\n","traces":[{"line":232,"address":[1432976,1433913],"length":1,"stats":{"Line":1},"fn_name":"merge_generators"},{"line":233,"address":[1433024],"length":1,"stats":{"Line":1},"fn_name":null},{"line":235,"address":[1433266],"len atistics},\n};\n\n// Error types and From\u003c...\u003e implementations\n\n#[derive(Debug)]\npub struct MetricError(pub String);\n\nimpl Display for MetricError {\n    #[cfg(not(tarpaulin_include))]\n    fn fmt(\u0026self, f: \u0026mut fmt::Formatter\u003c'_\u003e) -\u003e fmt::Result {\n        std::fmt::Display::fmt(\u0026self.0, f)\n    }\n}\n\n#[derive(thiserror::Error, Debug)]\npub enum Error {\n    #[error(\"Graph initialization error\")]\n    GraphError(GraphError),\n    #[error(\"Error while parsing input file with graph description\")]\n    ParseError(Vec\u003cVerboseErrorKind\u003e),\n    #[error(\"Error while parsing graph from command line\")]\n    CLIParseError(io::Error),\n    #[error(\"Error while calling Kissat\")]\n    KissatError(kissat_rs::Error),\n    #[error(\"Unknown metric used\")]\n    MetricError(MetricError),\n}\n\nimpl From\u003cGraphError\u003e for Error {\n    #[cfg(not(tarpaulin_include))]\n    fn from(ge: GraphError) -\u003e Self {\n        Self::GraphError(ge)\n    }\n}\n\n#[cfg(not(tarpaulin_include))]\nfn handle_nom_verbose_error\u003cE: Debug\u003e(\n    should_print: bool,\n    verbose: VerboseError\u003cE\u003e,\n) -\u003e Vec\u003cVerboseErrorKind\u003e {\n    verbose\n        .errors\n        .into_iter()\n        .map(|(msg, kind)| {\n            if should_print {\n                eprintln!(\"{:?}\", msg);\n            }\n            kind\n        })\n        .collect()\n}\n\nimpl\u003c'a\u003e From\u003cnom::Err\u003cParseError\u003c'a\u003e\u003e\u003e for Error {\n    #[cfg(not(tarpaulin_include))]\n    fn from(pe: nom::Err\u003cParseError\u003c'a\u003e\u003e) -\u003e Self {\n        match pe {\n            nom::Err::Error(verbose) | nom::Err::Failure(verbose) =\u003e {\n                Self::ParseError(handle_nom_verbose_error(true, verbose))\n            }\n            nom::Err::Incomplete(_) =\u003e unreachable!(),\n        }\n    }\n}\n\nimpl\u003c'a\u003e From\u003cnom::Err\u003cBinParseError\u003c'a\u003e\u003e\u003e for Error {\n    #[cfg(not(tarpaulin_include))]\n    fn from(pe: nom::Err\u003cBinParseError\u003c'a\u003e\u003e) -\u003e Self {\n        match pe {\n            nom::Err::Error(verbose) | nom::Err::Failure(verbose) =\u003e {\n                Self::ParseError(handle_nom_verbose_error(false, verbose))\n            }\n            nom::Err::Incomplete(_) =\u003e unreachable!(),\n        }\n    }\n}\n\nimpl From\u003ckissat_rs::Error\u003e for Error {\n    #[cfg(not(tarpaulin_include))]\n    fn from(ke: kissat_rs::Error) -\u003e Self {\n        Self::KissatError(ke)\n    }\n}\n\nimpl From\u003cio::Error\u003e for Error {\n    #[cfg(not(tarpaulin_include))]\n    fn from(ie: io::Error) -\u003e Self {\n        Self::CLIParseError(ie)\n    }\n}\n\nimpl From\u003cMetricError\u003e for Error {\n    #[cfg(not(tarpaulin_include))]\n    fn from(me: MetricError) -\u003e Self {\n        Self::MetricError(me)\n    }\n}\n\n// Custom debug methods\n\nimpl fmt::Debug for OrbitStatistics {\n    #[cfg(not(tarpaulin_include))]\n    fn fmt(\u0026self, f: \u0026mut fmt::Formatter\u003c'_\u003e) -\u003e fmt::Result {\n        self.orbit_sizes.fmt(f)\n    }\n}\n\n#[cfg(not(tarpaulin_include))]\nfn _print_clause\u003c'a\u003e(clause: impl Iterator\u003cItem = \u0026'a Literal\u003e) {\n    print!(\"(\");\n    itertools::Itertools::intersperse(\n        clause.map(|literal| {\n            if *literal \u003c 0 {\n                format!(\"¬{}\", -1 * literal)\n            } else {\n                format!(\"{}\", literal)\n            }\n        }),\n        \" ∨ \".to_string(),\n    )\n    .for_each(|part| print!(\"{}\", part));\n\n    println!(\") ∧\");\n}\n\n#[cfg(not(tarpaulin_include))]\npub fn _print_formula(formula: impl Iterator\u003cItem = Clause\u003e) {\n    formula.for_each(|clause| _print_clause(clause.iter()));\n    println!(\"True\");\n}\n\n#[cfg(not(tarpaulin_include))]\npub fn write_formula_dimacs(\n    writer: \u0026mut impl Write,\n    formula: \u0026[Clause],\n    variable_number: usize,\n) -\u003e Result\u003c(), Error\u003e {\n    let header = Header {\n        var_count: variable_number,\n        clause_count: formula.len(),\n    };\n    write_header(writer, header)?;\n\n    for clause in formula {\n        write_clause(writer, clause)?;\n    }\n\n    writer.flush().map_err(Error::from)\n}\n\n#[cfg(not(tarpaulin_include))]\npub fn print_orbits_nauty_style(orbits: Orbits, statistics: Option\u003c\u0026Statistics\u003e) {\n    // This is necessary to give a correct\n    // start point for the output.\n    let runtime = if let Some(statistics) = statistics {\n        statistics.start_time.elapsed()\n    } else {\n        Duration::ZERO\n    };\n    println!(\"cpu time = {:.6} seconds\", runtime.as_secs_f64());\n\n    orbits\n        .encode_high()\n        .into_iter()\n        .for_each(|(orbit, members)| {\n            if members.len() \u003e 1 {\n                members.iter().for_each(|member| print!(\"{} \", member));\n                print!(\"({}); \", members.len());\n            } else {\n                print!(\"{}; \", orbit);\n            }\n        });\n\n    // Force new line and flush everything out.\n    println!();\n    std::io::stdout()\n        .flush()\n        .expect(\"Why would stdout not be flushed?\");\n}\n\n#[cfg(not(tarpaulin_include))]\npub fn print_generator(mut generator: Permutation) {\n    let cycles = generator.get_cycles();\n\n    if cycles.is_empty() {\n        println!(\"Identity permutation.\");\n        return;\n    }\n\n    for cycle in cycles {\n        print!(\"(\");\n        Itertools::intersperse(\n            cycle.iter().map(|vertex| vertex.to_string()),\n            \" \".to_string(),\n        )\n        .for_each(|ele| print!(\"{}\", ele));\n        print!(\") \");\n    }\n    println!();\n}\n\n#[cfg(not(tarpaulin_include))]\npub fn _print_dot(quotient_encoding: QuotientGraphEncoding, graph: \u0026Graph) -\u003e Result\u003c(), Error\u003e {\n    println!(\"graph graphname {{\");\n\n    let colors = vec![\"red\", \"green\", \"blue\", \"black\", \"yellow\", \"orange\"]; // I don't expect to print more than 4 orbits at a time with one color per orbit.\n\n    let mut vertices_in_core = quotient_encoding\n        .1\n        .iter()\n        .map(|(_, vertices)| vertices)\n        .cloned()\n        .flatten()\n        .collect::\u003cVec\u003cVertexIndex\u003e\u003e();\n    vertices_in_core.sort_unstable();\n\n    for (orbit, color) in quotient_encoding.1.iter().zip(colors) {\n        for vertex in orbit.1.iter() {\n            println!(\"{:?} [color={:?}];\", vertex, color);\n            for end in graph.get_vertex(*vertex)?.edges_to.iter() {\n                if vertex \u003c end \u0026\u0026 vertices_in_core.binary_search(end).is_ok() {\n                    println!(\"{:?} -- {:?};\", vertex, end);\n                }\n            }\n        }\n    }\n\n    println!(\"}}\");\n    Ok(())\n}\n\n// Custom formatter for debug printing\n\n#[cfg(not(tarpaulin_include))]\npub fn opt_fmt\u003cT: fmt::Debug\u003e(option: \u0026Option\u003cT\u003e, f: \u0026mut fmt::Formatter\u003c'_\u003e) -\u003e fmt::Result {\n    match option {\n        Some(val) =\u003e val.fmt(f),\n        None =\u003e write!(f, \"None\"),\n    }\n}\n\n#[cfg(not(tarpaulin_include))]\npub fn result_fmt\u003cT: fmt::Debug, E: fmt::Debug\u003e(\n    result: \u0026Result\u003cT, E\u003e,\n    f: \u0026mut fmt::Formatter\u003c'_\u003e,\n) -\u003e fmt::Result {\n    match result {\n        Ok(val) =\u003e val.fmt(f),\n        Err(e) =\u003e e.fmt(f),\n    }\n}\n\n#[allow(clippy::ptr_arg)]\n#[cfg(not(tarpaulin_include))]\npub fn bin_fmt(vec: \u0026Vec\u003cu64\u003e, f: \u0026mut fmt::Formatter\u003c'_\u003e) -\u003e fmt::Result {\n    write!(f, \"{{\")?;\n    for number in vec {\n        write!(f, \"{:#066b}\", number)?;\n    }\n    write!(f, \"}}\")?;\n\n    Ok(())\n}\n\n// Debug macros that allow to time single expressions\n\n#[macro_export]\nmacro_rules! time {\n    ($i:ident, $ret:ident, $ex it_part = (orbit as i64) \u003c\u003c 32;\n        orbit_part + (vertex as i64)\n    }\n\n    fn unpair(pairing: i64) -\u003e (VertexIndex, VertexIndex) {\n        let orbit = pairing \u003e\u003e 32;\n        let vertex = pairing as i32;\n        (orbit as i32, vertex)\n    }\n\n    fn get_new_literal(\u0026mut self) -\u003e Literal {\n        let new_literal = self.literal_counter;\n\n        // Kissat doesn't allow variables over 2^28-1.\n        debug_assert!(new_literal \u003c MAX_LITERAL);\n\n        self.literal_counter += 1;\n        new_literal\n    }\n\n    pub fn variable_number(\u0026self) -\u003e usize {\n        self.literal_counter as usize\n    }\n\n    pub fn destroy(mut self) -\u003e Vec\u003c(VertexIndex, VertexIndex)\u003e {\n        let mut pairs = vec![(-1, -1); self.literal_counter as usize];\n        for (pairing, literal) in self.literal_map.drain() {\n            pairs[literal as usize] = Self::unpair(pairing);\n        }\n        pairs\n    }\n}\n\n#[cfg(test)]\nmod test {\n    use super::*;\n\n    #[test]\n    fn test_pair() {\n        let orbit = 0x12345678;\n        let vertex = 0x07654321;\n        let pair = SATEncodingDictionary::pairing(orbit, vertex);\n        assert_eq!(0x1234567807654321, pair);\n    }\n\n    #[test]\n    fn test_unpair() {\n        let (orbit, vertex) = SATEncodingDictionary::unpair(0x1234567801234567);\n        assert_eq!(0x12345678, orbit);\n        assert_eq!(0x01234567, vertex);\n    }\n}\n","traces":[{"line":18,"address":[1811824],"length":1,"stats":{"Line":1},"fn_name":"default"},{"line":21,"address":[1811838],"length":1,"stats":{"Line":1},"fn_name":null},{"line":28,"address":[1811888],"length":1,"stats":{"Line":1},"fn_name":"lookup_pairing"},{"line":29,"address":[1811931],"length":1,"stats":{"Line":1},"fn_name":null},{"line":31,"address":[1812000,1811946],"length":1,"stats":{"Line":2},"fn_name":null},{"line":32,"address":[1811994],"length":1,"stats":{"Line":1},"fn_name":null},{"line":34,"address":[1812007        .into_iter()\n            .map(|(orbit_number, vertices)| {\n                (\n                    orbit_number,\n                    vertices\n                        .into_iter()\n                        .map(|(vertex, _)| vertex as VertexIndex)\n                        .collect(),\n                )\n            })\n            .collect()\n    }\n}\n\n#[derive(Debug, Clone)]\npub struct QuotientGraphEncoding(pub Vec\u003cEdgeEncoding\u003e, pub Vec\u003cOrbitEncoding\u003e);\n\nimpl HighLevelEncoding for QuotientGraph {\n    type HighLevelRepresentation = QuotientGraphEncoding;\n\n    fn encode_high(\u0026self) -\u003e Self::HighLevelRepresentation {\n        QuotientGraphEncoding(self.quotient_graph.encode_high(), self.orbits.encode_high())\n    }\n}\n","traces":[{"line":19,"address":[1074736],"length":1,"stats":{"Line":1},"fn_name":"get_edge"},{"line":20,"address":[1074745],"length":1,"stats":{"Line":1},"fn_name":null},{"line":27,"address":[750064],"length":1,"stats":{"Line":1},"fn_name":"encode_high"},{"line":28,"address":[750088],"length":1,"stats":{"Line":1},"fn_name":null},{"line":29,"address":[1794048,1794065],"length":1,"stats":{"Line":2},"fn_name":"{closure#0}"},{"line":39,"address":[1732976,1733240],"length":1,"stats":{"Line":1},"fn_name":"encode_high"},{"line":40,"address":[1733014,1733221],"length":1,"stats":{"Line":2},"fn_name":null},{"line":42,"address":[1794121,1794096],"length":1,"stats":{"Line":2},"fn_name":"{closure#0}"},{"line":43,"address":[1794160,1794205],"length":1,"stats":{"Line":2},"fn_name":"{closure#1}"},{"line":44,"address":[1794256,1794269],"length":1,"stats":{"Line":2},"fn_name":"{closure#2}"},{"line":46,"address":[1794336,1794361],"length":1,"stats":{"Line":2},"fn_name":"{closure#3}"},{"line":48,"address":[],"length":0,"stats":{"Line":0},"fn_name":null},{"line":49,"address":[1794410],"length":1,"stats":{"Line":1},"fn_name":null},{"line":50,"address":[],"length":0,"stats":{"Line":0},"fn_name":null},{"line":51,"address":[17943 {\n            orbit_element_encodings.push(dict.lookup_pairing(*orbit, *orbit_element));\n        }\n\n        vec![orbit_element_encodings]\n    }\n}\n\nimpl SATEncoding for QuotientGraphEncoding {\n    fn encode_sat(\u0026self, dict: \u0026mut SATEncodingDictionary, original_graph: \u0026Graph) -\u003e Formula {\n        // This is actually the encoding that edges between two\n        // vertices (i.e. two orbits) of a quotient graph is preserved\n        // when the transversal chooses two vertices from the orbits.\n        let QuotientGraphEncoding(quotient_edges, orbits) = self;\n        let mut formula = Vec::new();\n\n        // for all (o1,o2) edges in the quotient graph G\\O (i.e. o1, o2 in O)\n        for (start_orbit, end_orbit) in quotient_edges.iter().map(EdgeEncoding::get_edge) {\n            let start_orbit_elements = {\n                let index = orbits.binary_search_by(|(orbit,_)| orbit.cmp(\u0026start_orbit)) .expect(\n                    \"The edges were computed from the orbits, how can there be no fitting orbit?\",\n                );\n                \u0026orbits[index].1\n            };\n            let end_orbit_elements =\n                {\n                    let index = orbits.binary_search_by(|(orbit,_)| orbit.cmp(\u0026end_orbit)) .expect(\n                    \"The edges were computed from the orbits, how can there be no fitting orbit?\",\n                );\n                    \u0026orbits[index].1\n                };\n\n            // for all vertices v1 in o1\n            for start_orbit_element in start_orbit_elements {\n                // for all vertices v2 in o2\n                'end: for end_orbit_element in end_orbit_elements {\n                    // If the edge (v1,v2) for the two picked vertices exists\n                    // in the original graph, we do not need to encode it.\n                    if original_graph.lookup_edge(start_orbit_element, end_orbit_element) {\n                        continue 'end;\n                    }\n\n                    let start_orbit_relation =\n                        dict.lookup_pairing(start_orbit, *start_orbit_element);\n                    let end_orbit_relation = dict.lookup_pairing(end_orbit, *end_orbit_element);\n\n                    // If there is an edge in the quotient graph,\n                    // the transversal needs to pick vertices from\n                    // the related orbits that are also connected in G.\n                    // We don't actually need to encode this for existing edges\n                    // in G but only for non-existing ones. We also don't need\n                    // the edge in the quotient graph, as it also exists.\n                    // ------------------------------------------------\n                    // (o1,o2) \u0026\u0026 (o1, v1) \u0026\u0026 (o2,v2) =\u003e False\n                    // ~(o1, v1) || ~(o2,v2)\n                    let clause = vec![-start_orbit_relation, -end_orbit_relation];\n                    formula.push(clause);\n                }\n            }\n        }\n\n        formula\n    }\n}\n","traces":[{"line":14,"address":[1733763,1733280],"length":1,"stats":{"Line":2},"fn_name":"encode_sat"},{"line":29,"address":[1733339],"length":1,"stats":{"Line":2},"fn_name":null},{"line":30,"address":[1733380],"length":1,"stats":{"Line":2},"fn_name":null},{"line":32,"address":[1733672,1733419,1733737,1733508],"length":1,"stats":{"Line":8},"fn_name":null},{"line":33,"address":[1733704],"length":1,"stats":{"Line":2},"fn_name":null},{"line":36,"address":[1733580],"length":1,"stats":{"Line":2},"fn_name":null},{"line":41,"address":[1074784,1076502],"length":1,"stats":{"Line":1},"fn_name":"encode_sat"},{"line":45,"address":[1074850],"length":1,"stats":{"Line":1},"fn_name":null},{"line":46,"address":[1074889],"length":1,"stats":{"Line":1},"fn_name":null},{"line":49,"address":[1074902,1075278,1075032,1075899],"length":1,"stats":{"Line":4},"fn_name":null},{"line":50,"address":[],"length":0,"stats": llow(clippy::needless_collect)]\npub fn encode_problem(\n    quotient_graph: \u0026QuotientGraph,\n    original_graph: \u0026Graph,\n) -\u003e Option\u003c(impl Iterator\u003cItem = Clause\u003e, SATEncodingDictionary)\u003e {\n    let mut dict = SATEncodingDictionary::default();\n\n    let QuotientGraphEncoding(quotient_edges, orbits) = quotient_graph.encode_high();\n\n    let transversal_encoding = orbits\n        .iter()\n        .flat_map(|orbit| orbit.encode_sat(\u0026mut dict, original_graph))\n        .collect::\u003cFormula\u003e();\n\n    let descriptive_constraint_encoding =\n        QuotientGraphEncoding(quotient_edges, orbits).encode_sat(\u0026mut dict, original_graph);\n\n    if descriptive_constraint_encoding.is_empty() {\n        None\n    } else {\n        Some((\n            transversal_encoding\n                .into_iter()\n                .chain(descriptive_constraint_encoding.into_iter()),\n            dict,\n        ))\n    }\n}\n\n#[cfg(test)]\nmod test {\n    use crate::{encoding::high_level::EdgeEncoding, graph::GraphError, Error};\n\n    use super::*;\n\n    #[test]\n    fn test_encode_problem_trivial() -\u003e Result\u003c(), GraphError\u003e {\n        // 0 -- 1 -- 2 where 0 and 2 are in the same orbit\n        let mut graph = Graph::new_ordered(3);\n        graph.add_arc(0, 1)?;\n        graph.add_arc(2, 1)?;\n        let orbits = vec![0, 1, 0];\n        let quotient_graph = QuotientGraph::from_graph_orbits(\u0026graph, orbits);\n\n        let formula = encode_problem(\u0026quotient_graph, \u0026graph);\n        assert!(formula.is_none());\n        Ok(())\n    }\n\n    #[test]\n    fn test_encode_problem_nontrivial() -\u003e Result\u003c(), GraphError\u003e {\n        //0-1-2-3, where 1 and 2 are in the same (fake) orbit.\n        let mut graph = Graph::new_ordered(4);\n        graph.add_edge(0, 1)?;\n        graph.add_edge(1, 2)?;\n        graph.add_edge(2, 3)?;\n        let colors = vec![1, 2, 2, 3];\n        graph.set_colours(\u0026colors)?;\n\n        // Not the actual orbits, but used to check for non-descriptiveness.\n        let fake_orbits = vec![0, 1, 1, 3];\n        let quotient = QuotientGraph::from_graph_orbits(\u0026graph, fake_orbits);\n\n        let expected: Formula = vec![\n            // vertex 0 in orbit 0\n            vec![1],\n            // Exactly one of 1,2 in orbit 1\n            vec![2, 3],\n            // vertex 3 in orbit 3\n            vec![4],\n            // can't pick both 0 in 0 and 2 in 1\n            vec![-1, -3],\n            // can't pick both 2 in 1 and 0 in 0\n            vec![-3, -1],\n            // can't pick both 1 in 1 and 3 in 3\n            vec![-2, -4],\n            // can't pick both 3 in 3 and 1 in 1\n            vec![-4, -2],\n        ];\n\n        let formula = encode_problem(\u0026quotient, \u0026graph);\n        assert!(formula.is_some());\n        assert!(formula\n            .unwrap()\n            .0\n            .zip(expected.into_iter())\n            .all(|(fst, snd)| fst == snd));\n\n        Ok(())\n    }\n\n    #[test]\n    fn test_encode_graph_edges() -\u003e Result\u003c(), Error\u003e {\n        let mut graph = Graph::new_ordered(5);\n        graph.add_arc(0, 1)?;\n        graph.add_arc(1, 2)?;\n        graph.add_arc(3, 4)?;\n        graph.add_arc(4, 0)?;\n\n        assert_eq!(true, graph.lookup_edge(\u00260, \u00261));\n        assert_eq!(true, graph.lookup_edge(\u00261, \u00262));\n        assert_eq!(true, graph.lookup_edge(\u00263, \u00264));\n        assert_eq!(true, graph.lookup_edge(\u00264, \u00260));\n\n        Ok(())\n    }\n\n    #[test]\n    fn test_descriptive_constraint() {\n        let orbit_encoding = vec![(0, vec![0, 1]), (2, vec![2, 3])];\n        let edge_encoding = vec![EdgeEncoding(0, 2)];\n        let mut dict = SATEncodingDictionary::default();\n        let some_graph = Graph::new_ordered(4);\n\n        let o0v0 = dict.lookup_pairing(0, 0);\n        let o0v1 = dict.lookup_pairing(0, 1);\n        let o2v2 = dict.lookup_pairing(2, 2);\n        let o2v3 = dict.lookup_pairing(2, 3);\n\n        let constraint02 = vec![-o0v0, -o2v2];\n        let constraint03 = vec![-o0v0, -o2v3];\n        let constraint12 = vec![-o0v1, -o2v2];\n        let constraint13 = vec![-o0v1, -o2v3];\n\n        let formula =\n            QuotientGraphEncoding(edge_encoding, orbit_encoding).encode_sat(\u0026mut dict, \u0026some_graph);\n        assert_eq!(4, formula.len());\n        assert!(formula.contains(\u0026constraint02));\n        assert!(formula.contains(\u0026constraint03));\n        assert!(formula.contains(\u0026constraint12));\n        assert!(formula.contains(\u0026constraint13));\n    }\n\n    #[test]\n    fn test_transversal_encoding() {\n        let orbit_encoding = (0, vec![0, 1, 4]);\n        let mut dict = SATEncodingDictionary::default();\n        let some_graph = Graph::new_ordered(0);\n        let pick0 = dict.lookup_pairing(0, 0);\n        let pick1 = dict.lookup_pairing(0, 1);\n        let pick4 = dict.lookup_pairing(0, 4);\n        assert_eq!(1, pick0);\n        assert_eq!(2, pick1);\n        assert_eq!(3, pick4);\n\n        let at_least_one = vec![vec![pick0, pick1, pick4]];\n\n        let formula = orbit_encoding.encode_sat(\u0026mut dict, \u0026some_graph);\n        assert_eq!(1, formula.len());\n        assert_eq!(at_least_one, formula);\n    }\n\n    #[test]\n    fn test_encode_graph() {\n        let mut graph = Graph::new_ordered(4);\n        graph.add_arc(0, 1).unwrap();\n        graph.add_arc(1, 2).unwrap();\n        graph.add_arc(2, 3).unwrap();\n        graph.add_arc(3, 1).unwrap();\n        let encoded = graph.encode_high();\n        assert_eq!(\n            encoded,\n            vec![\n                EdgeEncoding(0, 1),\n                EdgeEncoding(1, 2),\n                EdgeEncoding(2, 3),\n                EdgeEncoding(3, 1)\n            ]\n        );\n    }\n\n    #[test]\n    fn test_encode_orbits() {\n        let orbits = vec![0, 1, 2, 0, 2, 1, 0];\n        let encoded = orbits.encode_high();\n        assert_eq!(\n            encoded,\n            vec![(0, vec![0, 3, 6]), (1, vec![1, 5]), (2, vec![2, 4])]\n        );\n    }\n}\n","traces":[{"line":24,"address":[1415088,1416440],"length":1,"stats":{"Line":1},"fn_name":"encode_problem"},{"line":28,"address":[1415123],"length":1,"stats":{"Line":1},"fn_name":null},{"line":30,"address":[1415202],"length":1,"stats":{"Line":1},"fn_name":null},{"line":32,"address":[1415371,1415297,1415471],"length":1,"stats":{"Line":3},"fn_name":null},{"line":34,"address":[1268163,1268128],"length":1,"stats":{"Line":5},"fn_name":"{closure#0}"},{"line":37,"address":[1415533],"length":1,"stats":{"Line":2},"fn_name":null},{"line":40,"address":[1415797,1415852,1416222],"length":1,"stats":{"Line":5},"fn_name":null},{"line":41,"address":[1415926],"length":1,"stats":{"Line":1},"fn_name":null},{"line":43,"address":[1416143],"length":1,"stats":{"Line":1},"fn_name":null},{"line":44,"address":[1416024,1415858],"length":1,"stats":{"Line":2},"fn_name":null},{"line":45,"address":[1415953],"length":1,"stats":{"Line":1},"fn_name":null},{"line":46,"address":[1415961,1416063,1416227],"length":1,"stats":{"Line":1},"fn_name":null},{"line":47,"address":[1416112],"length":1,"stats":{"Line":1},"fn_name":null},{"line":59,"address":[1045237,1044528],"length":1,"stats":{"Line":3},"fn_name":"test_encode_problem_trivial"},{"line":61,"address":[1044535],"length":1,"stats":{"Line":1},"fn_name":null},{"line":62,"address":[1044653,1044710,1044562],"length":1,"stats":{"Line":2},"fn_name":null},{"line":63,"address":[1044691,1044779,1044887],"length":1,"stats":{"Line":2},"fn_name":null},{"line":64,"address":[1044839],"length":1,"stats":{"Line":1},"fn_name":null},{"line":65,"address":[1044954],"length":1,"stats":{"Line":1},"fn_name":null},{"line":67,"address":[1045035],"length":1,"stats":{"Line":1},"fn_name":null},{"line":68,"address":[1045050,1045107,1045175],"length":1,"stats":{"Line":2},"fn_name":null},{"line":69,"address":[1045152], s(PlanResult, PlanResult),\n    NoActionSymmetry,\n    Nondescriptive,\n    TimedOut,\n}\n\n#[derive(Debug, Default, PartialEq)]\nstruct ToolStats {\n    search_time: f64,\n    translation_time: f64,\n    quotient_search_time: f64,\n    quotient_translation_time: f64,\n    symm_det_time: f64,\n    colouring_time: f64,\n    inst_find_time: f64,\n}\n\nimpl Display for ToolStats {\n    fn fmt(\u0026self, f: \u0026mut std::fmt::Formatter\u003c'_\u003e) -\u003e std::fmt::Result {\n        write!(\n            f,\n            \"{:.6} {:.6} {:.6} {:.6} {:.6} {:.6} {:.6}\",\n            self.search_time,\n            self.translation_time,\n            self.quotient_search_time,\n            self.quotient_translation_time,\n            self.symm_det_time,\n            self.colouring_time,\n            self.inst_find_time\n        )\n    }\n}\n\n#[derive(Debug)]\npub struct Log {\n    metric: MetricUsed,\n    default_result: PlanResult,\n    quotient_result: QuotientResult,\n    tool_stats: ToolStats,\n}\n\nimpl PartialEq for Log {\n    fn eq(\u0026self, other: \u0026Self) -\u003e bool {\n        self.metric == other.metric\n            \u0026\u0026 self.default_result == other.default_result\n            \u0026\u0026 self.quotient_result == other.quotient_result\n    }\n}\n\nimpl Eq for Log {}\n\nfn evaluate_plan_result\u003c'a\u003e(line: Input\u003c'a\u003e) -\u003e Option\u003cPlanResult\u003e {\n    use nom::{\n        branch::alt, bytes::complete::tag, character::complete::digit1, combinator::map,\n        sequence::preceded,\n    };\n    let valid_tag =\n        tag::\u003cInput\u003c'a\u003e, Input\u003c'a\u003e, ParseError\u003c'a\u003e\u003e(\"Plan is valid and it is of length \");\n    let valid_parser = map(preceded(valid_tag, digit1), |length: \u0026str| {\n        PlanResult::ValidPlan(length.parse().unwrap())\n    });\n    let not_solved_parser = map(\n        tag(\"The problem was not solved! Plan can't be valid!\"),\n        |_| PlanResult::NotSolved,\n    );\n    alt((valid_parser, not_solved_parser))(line)\n        .ok()\n        .map(|(_, plan_result)| plan_result)\n}\n\nfn evaluate_tool_stats\u003c'a\u003e(line: \u0026'a str) -\u003e Option\u003cToolStats\u003e {\n    use nom::{\n        character::complete::{char, i32, multispace0},\n        combinator::recognize,\n        multi::many_m_n,\n        sequence::{preceded, terminated, tuple},\n    };\n\n    let int_parser =\n        terminated::\u003cInput\u003c'a\u003e, i32, Input\u003c'a\u003e, ParseError\u003c'a\u003e, _, _\u003e(i32, multispace0);\n    let float_parser = terminated(recognize(tuple((i32, char('.'), i32))), multispace0);\n    let uninteresting_parser = many_m_n(11, 11, int_parser);\n    let interesting_parser = many_m_n(7, 7, float_parser);\n\n    preceded(uninteresting_parser, interesting_parser)(line)\n        .ok()\n        .map(|(_, times)| ToolStats {\n            search_time: times[0].parse().unwrap(),\n            translation_time: times[1].parse().unwrap(),\n            quotient_search_time: times[2].parse().unwrap(),\n            quotient_translation_time: times[3].parse().unwrap(),\n            symm_det_time: times[4].parse().unwrap(),\n            colouring_time: times[5].parse().unwrap(),\n            inst_find_time: times[6].parse().unwrap(),\n        })\n}\n\nfn evaluate_log\u003cB: BufRead\u003e(peekable: \u0026mut Peekable\u003c\u0026mut Lines\u003cB\u003e\u003e) -\u003e Option\u003cLog\u003e {\n    let metric = peekable.find_map(|line| {\n        line.unwrap()\n            .strip_suffix(':')\n            .map(|line| MetricUsed::from_str(line).ok())\n            .flatten()\n    })?;\n    let tool_stats = peekable\n        .next()\n        .map(|line| evaluate_tool_stats(line.as_ref().unwrap()))\n        .flatten()\n        .unwrap_or_else(Default::default);\n    let default_result = peekable.find_map(|line| evaluate_plan_result(line.unwrap().as_str()))?;\n\n    let mut quotient_result = QuotientResult::TimedOut;\n    let mut quotient_next = false;\n\n    loop {\n        if peekable\n            .next_if(|line| line.as_ref().unwrap() == \"No symmetries found, exiting!!\")\n            .is_some()\n        {\n            quotient_result = QuotientResult::NoActionSymmetry;\n            break;\n        } else if peekable\n            .next_if(|line| line.as_ref().unwrap() == \"No covering instantiations, exiting!!\")\n            .is_some()\n        {\n            quotient_result = QuotientResult::Nondescriptive;\n            break;\n        } else if peekable\n            .next_if(|line| line.as_ref().unwrap() == \"Quotient problem plan:\")\n            .is_some()\n        {\n            quotient_result =\n                QuotientResult::QuotientConcretePlans(PlanResult::NotSolved, PlanResult::NotSolved);\n            quotient_next = true;\n        } else if peekable\n            .next_if(|line| line.as_ref().unwrap() == \"Concrete problem plan:\")\n            .is_some()\n        {\n            quotient_next = false;\n        } else if peekable\n            .peek()?\n            .as_ref()\n            .unwrap()\n            .strip_suffix(':')\n            .map(|line| MetricUsed::from_str(line).ok())\n            .flatten()\n            .is_some()\n        {\n            quotient_result = QuotientResult::TimedOut;\n            break;\n        } else if let Some(plan_result) =\n            evaluate_plan_result(peekable.peek().unwrap().as_ref().unwrap().as_str())\n        {\n            if quotient_next {\n                quotient_result =\n                    QuotientResult::QuotientConcretePlans(plan_result, PlanResult::NotSolved);\n                peekable.next();\n                if matches!(plan_result, PlanResult::NotSolved) {\n                    break;\n                } else {\n                    continue;\n                }\n            } else if let QuotientResult::QuotientConcretePlans(quotient, _) = quotient_result {\n                quotient_result = QuotientResult::QuotientConcretePlans(quotient, plan_result);\n                peekable.next();\n                break;\n            }\n            unreachable!();\n        } else {\n            peekable.next();\n        }\n    }\n\n    Some(Log {\n        metric,\n        default_result,\n        quotient_result,\n        tool_stats,\n    })\n}\n\n#[cfg(not(tarpaulin_include))]\npub fn evaluate_log_file\u003cB: BufRead\u003e(file_as_lines: \u0026mut Lines\u003cB\u003e) -\u003e Vec\u003cLog\u003e {\n    let mut logs = Vec::new();\n    let mut peekable = file_as_lines.peekable();\n\n    while let Some(log) = evaluate_log(\u0026mut peekable) {\n        logs.push(log);\n    }\n\n    logs\n}\n\n#[cfg(not(tarpaulin_include))]\nfn compare_results(baseline: \u0026PlanResult, result: \u0026QuotientResult) -\u003e Ordering {\n    use std::cmp::Ordering::*;\n\n    if let PlanResult::ValidPlan(base) = baseline {\n        if let QuotientResult::QuotientConcretePlans(_, result) = result {\n            match result {\n                PlanResult::ValidPlan(result) =\u003e base.cmp(result),\n                PlanResult::NotSolved =\u003e Less,\n            }\n        } else {\n            Less\n        }\n    } else if let QuotientResult::QuotientConcretePlans(_, result) = result {\n        if matches!(result, PlanResult::ValidPlan(_)) {\n            Greater\n        } else {\n            Equal\n        }\n    } else {\n        Equal\n    }\n}\n\n#[cfg(not(tarpaulin_include))]\nfn print_eval_results(\n    baseline: \u0026PlanResult,\n    standard: \u0026QuotientResult,\n    standard_result: \u0026Ordering,\n    result: Option\u003c(QuotientResult, ToolStats)\u003e,\n    name: \u0026str,\n) {\n    if let Some((result, stats)) = result {\n        let other_result = compare_results(baseline, \u0026result);\n        match other_result.cmp(standard_result) {\n            Ordering::Greater =\u003e println!(\"Success! {:?} for {}: {}\", result, name, stats),\n            Ordering::Equal =\u003e {\n                if let QuotientResult::QuotientConcretePlans(_, PlanResult::ValidPlan(n)) = standard\n                {\n                    if let QuotientResult::QuotientConcretePlans(_, PlanResult::ValidPlan(m)) =\n                        result\n                    {\n                        if *n \u003e m {\n                            println!(\"Success! {:?} for {}: {}\", result, name, stats);\n                            return;\n                        }\n                    }\n                }\n\n                println!(\"No failure! {:?} for {}: {}\", result, name, stats);\n            }\n            Ordering::Less =\u003e {\n                println!(\"Failure! {:?} for {}: {}\", result, name, stats);\n            }\n        }\n    }\n}\n\n#[cfg(not(tarpaulin_include))]\npub fn evaluate_logs(logs: Vec\u003cLog\u003e) {\n    let mut baseline = None;\n    let mut standard = None;\n    let mut least = None;\n    let mut biggest = None;\n    let mut sparse = None;\n\n    for log in logs {\n        match log.metric {\n            MetricUsed::LeastOrbits =\u003e least = Some((log.quotient_result, log.tool_stats)),\n            MetricUsed::BiggestOrbits =\u003e biggest = Some((log.quotient_result, log.tool_stats)),\n            MetricUsed::Sparsity =\u003e sparse = Some((log.quotient_result, log.tool_stats)),\n            MetricUsed::Standard =\u003e {\n                standard = Some((log.quotient_result, log.tool_stats));\n                baseline = Some(log.default_result);\n            }\n        }\n    }\n\n    if let Some(baseline) = baseline {\n        if let Some(standard) = standard {\n            let standard_result = compare_results(\u0026baseline, \u0026standard.0);\n            println!(\n                \"Baseline: {:?} Standard: {:?}, {}\",\n                baseline, standard.0, standard.1\n            );\n\n            print_eval_results(\u0026baseline, \u0026standard.0, \u0026standard_result, least, \"Least\");\n            print_eval_results(\u0026baseline, \u0026standard.0, \u0026standard_result, biggest, \"Biggest\");\n            print_eval_results(\u0026baseline, \u0026standard.0, \u0026standard_result, sparse, \"Sparse\");\n        }\n    }\n}\n\n#[cfg(test)]\nmod test {\n    use std::io::Cursor;\n\n    use super::*;\n\n    const TEST_STATS: ToolStats = ToolStats {\n        search_time: 4.101270,\n        translation_time: 25.530000,\n        quotient_search_time: -1.000000,\n        quotient_translation_time: 23.060000,\n        symm_det_time: 12.913098,\n        colouring_time: 0.000000,\n        inst_find_time: 0.010000,\n    };\n\n    #[test]\n    fn test_evaluate_plan_result() {\n        let plan_result1 = \"Plan is valid and it is of length 36\";\n        assert_eq!(\n            Some(PlanResult::ValidPlan(36)),\n            evaluate_plan_result(plan_result1),\n        );\n\n        let plan_result2 = \"The problem was not solved! Plan can't be valid!\";\n        assert_eq!(\n            Some(PlanResult::NotSolved),\n            evaluate_plan_result(plan_result2),\n        );\n\n        let plan_result3 = \"Covering instantiation set size is: 2\";\n        assert_eq!(None, evaluate_plan_result(plan_result3));\n    }\n\n    #[test]\n    fn test_evaluate_tool_stats() {\n        let tool_stats = \"6464 4482 418 400 109151 -1 10261 -1 98 1 0 4.101270 25.530000 -1.000000 23.060000 12.913098 0.000000 0.010000\";\n        assert_eq!(Some(TEST_STATS), evaluate_tool_stats(tool_stats));\n    }\n\n    #[test]\n    fn test_evaluate_log_nondescriptive() {\n        let raw = \"standard:\n6464 4482 418 400 109151 -1 10261 -1 98 1 0 4.101270 25.530000 -1.000000 23.060000 12.913098 0.000000 0.010000\nThe causal graph is not acyclic.\n51 variables of 51 necessary\nPlan is valid and it is of length 36\nInitial size of primary cover 9.\nInitial size of secondary cover 432.\nNumber of variable orbits is 0\nNumber of actions = 3114\nNumber of variables = 432\nPrinting action edges\nPrinting variable edges (only to variables)\nPrinting initial state edges\nPrinting goal edges\nNumber of action orbits = 918\nNumber of variable orbits = 179\nNumber of actions in the problem = 3114\nNumber of action orbits added to the quotient problem = 918\nNumber of var in the problem initial state = 51\nNumber of var orbits added to the quotient problem initial state = 31\nNumber of var in the problem goal state = 9\nNumber of var orbits added to the quotient problem goal state = 3\nPrimary cover size: 9\nNo covering instantiations, exiting!!\";\n        let mut lines = Cursor::new(raw).lines();\n        let mut peekable = (\u0026mut lines).peekable();\n        let log = evaluate_log(\u0026mut peekable);\n        let expected_log = Some(Log {\n            metric: MetricUsed::Standard,\n            default_result: PlanResult::ValidPlan(36),\n            quotient_result: QuotientResult::Nondescriptive,\n            tool_stats: TEST_STATS,\n        });\n        assert_eq!(expected_log, log);\n    }\n\n    #[test]\n    fn test_evaluate_log_nosymmetry() {\n        let raw = \"biggest_orbit:\n6464 4482 418 400 109151 -1 10261 -1 98 1 0 4.101270 25.530000 -1.000000 23.060000 12.913098 0.000000 0.010000\nThe causal graph is not acyclic.\n\n23 variables of 23 necessary\n\nCurrent action is 34\nCurrent action is 77\nCurrent action is 88\nCurrent action is 93\nCurrent action is 55\nPlan is valid and it is of length 5\nInitial size of primary cover 2.\nInitial size of secondary cover 66.\nNumber of variable orbits is 0\nNumber of actions = 104\nNumber of variables = 66\n\nPrinting action edges\n\nPrinting variable edges (only to variables)\n\nPrinting initial state edges\n\nPrinting goal edges\n\nNumber of action orbits = 104\nNumber of variable orbits = 66\nNumber of actions in the problem = 104\nNumber of action orbits added to the quotient problem = 104\nNumber of var in the problem initial state = 23\nNumber of var orbits added to the quotient problem initial state = 23\nNumber of var in the problem goal state = 2\nNumber of , Error\u003e {\n    if !generators.is_empty() {\n        write_gap_input(generators)?;\n        let before_gap_time = Instant::now();\n\n        let gap = Command::new(\"gap\")\n            .arg(\"-b\")\n            .arg(\"-o\")\n            .arg(\"4G\")\n            .arg(\"--nointeract\")\n            .arg(GAP_IN_FILE)\n            .stdout(Stdio::piped())\n            .spawn()?;\n\n        let gap_out = gap.wait_with_output()?;\n        statistics.log_gap_done(before_gap_time.elapsed());\n\n        if gap_out.status.success() {\n            let representatives = parse_representatives(\u0026gap_out.stdout, graph.size())?;\n            for mut representative in representatives {\n                if check_class_stats(graph, \u0026mut representative, statistics)? {\n                    //print_orbits_nauty_style(orbits, Some(statistics));\n                    break;\n                }\n            }\n        }\n    }\n\n    statistics.exhausted = true;\n    statistics.log_end();\n    statistics.save_statistics()\n}\n","traces":[],"covered":0,"coverable":0},{"path":["/","__w","dqg","dqg","src","gap","parser.rs"],"content":"use crate::{\n    graph::VertexIndex,\n    parser::{BinInput, BinParseResult},\n    permutation::Permutation,\n    Error,\n};\n\nuse nom::{\n    character::complete::{char, i32, line_ending, multispace0},\n    combinator::map,\n    multi::{many1, separated_list1},\n    sequence::{delimited, preceded, tuple},\n};\n\nfn parse_cycle(input: BinInput\u003c'_\u003e) -\u003e BinParseResult\u003c'_, Vec\u003cVertexIndex\u003e\u003e {\n    let cycle = separated_list1(char(','), preceded(multispace0, map(i32, |i| i - 1)));\n    preceded(multispace0, delimited(char('('), cycle, char(')')))(input)\n}\n\nfn parse_permutation(input: BinInput\u003c'_\u003e, size: usize) -\u003e BinParseResult\u003c'_, Permutation\u003e {\n    map(many1(parse_cycle), |cycles| {\n        Permutation::from_cycles(cycles, size)\n    })(input)\n}\n\nfn parse_generators(input: BinInput\u n    let quotient_stats = QuotientStatistics {\n        quotient_size,\n        core_size: None,\n        max_orbit_size,\n        min_orbit_size,\n        descriptive,\n        validated: None,\n        quotient_handling_time: start_time.elapsed(),\n        kissat_time,\n        orbit_gen_time,\n        quotient_gen_time,\n        encoding_time,\n        orbit_sizes: Default::default(),\n    };\n    statistics.log_quotient_statistic(quotient_stats);\n    statistics.log_iteration();\n\n    Ok(result)\n}\n","traces":[],"covered":0,"coverable":0},{"path":["/","__w","dqg","dqg","src","graph","internal_graph.rs"],"content":"use custom_debug_derive::Debug;\n\nuse super::{Colour, GraphError, VertexIndex, DEFAULT_COLOR};\n\n#[derive(std::fmt::Debug, PartialEq, Eq, Clone)]\npub enum GraphState {\n    IndexOrdered,\n    ColourGrouped,\n    ColourGroupedOrdered,\n    Chaos,\n    Fixed,\n    SparseSorted,\n}\n\n/// Fixed size graph.\n#[derive(Debug, PartialEq, Eq, Clone)]\npub struct Graph {\n    pub vertices: Vec\u003cVertex\u003e,\n    size: usize,\n    edge_number: usize,\n    #[debug(skip)]\n    pub state: GraphState,\n    max_color: Colour,\n}\n\n#[derive(Debug, Clone, PartialEq, Eq)]\npub struct Vertex {\n    pub index: VertexIndex,\n    pub edges_to: Vec\u003cVertexIndex\u003e,\n    pub colour: Colour,\n}\n\nimpl Graph {\n    pub fn size(\u0026self) -\u003e usize {\n        self.size\n    }\n\n    pub fn number_edges(\u0026self) -\u003e usize {\n        self.edge_number\n    }\n\n    pub fn is_sparse(\u0026self) -\u003e bool {\n        // A complete graph has n(n-1)/2 edges for n vertices.\n        // We draw the line between sparse and dense at half\n        // of the possible edges in a complete graph.\n        self.edge_number \u003c self.size * (self.size - 1) / 4\n    }\n\n    #[inline]\n    pub fn update_max_color(\u0026mut self, color: Colour) {\n        if color \u003e self.max_color {\n            self.max_color = color;\n        }\n    }\n\n    pub fn new_ordered(n: usize) -\u003e Self {\n        let mut vertices = Vec::with_capacity(n);\n        for index in 0..n {\n            vertices.push(Vertex::new(index as VertexIndex, DEFAULT_COLOR));\n        }\n        Graph {\n            vertices,\n            size: n,\n            edge_number: 0,\n            state: GraphState::IndexOrdered,\n            max_color: -1,\n        }\n    }\n\n    pub fn new_with_indices(indices: \u0026[VertexIndex], is_sorted: bool) -\u003e Self {\n        let mut vertices = Vec::with_capacity(indices.len());\n        for index in indices {\n            vertices.push(Vertex::new(*index, DEFAULT_COLOR));\n        }\n        Graph {\n            vertices,\n            size: indices.len(),\n            edge_number: 0,\n            state: if is_sorted {\n                GraphState::SparseSorted\n            } else {\n                GraphState::Chaos\n            },\n            max_color: -1,\n        }\n    }\n\n    pub fn set_vertex(\u0026mut self, new_vertex: Vertex) -\u003e Result\u003c(), GraphError\u003e {\n        use GraphState::*;\n        self.update_max_color(new_vertex.colour);\n        let index = new_vertex.index;\n        if self.state == IndexOrdered {\n            *self\n                .vertices\n                .get_mut(index as usize)\n                .ok_or(GraphError(index))? = new_vertex;\n        } else {\n            *self\n                .vertices\n                .iter_mut()\n                .find(|vertex| vertex.index == index)\n                .ok_or(GraphError(index))? = new_vertex;\n            if self.state != Fixed {\n                self.state = Chaos;\n            }\n        }\n        Ok(())\n    }\n\n    pub fn get_vertex(\u0026self, index: VertexIndex) -\u003e Result\u003c\u0026Vertex, GraphError\u003e {\n        match self.state {\n            GraphState::IndexOrdered =\u003e self.vertices.get(index as usize).ok_or(GraphError(index)),\n            GraphState::SparseSorted =\u003e Ok(\u0026self.vertices[self\n                .vertices\n                .binary_search_by(|vertex| vertex.index.cmp(\u0026index))\n                .unwrap()]),\n            _ =\u003e self\n                .vertices\n                .iter()\n                .find(|vertex| vertex.index == index)\n                .ok_or(GraphError(index)),\n        }\n    }\n\n    fn get_vertex_mut(\u0026mut self, index: VertexIndex) -\u003e Result\u003c\u0026mut Vertex, GraphError\u003e {\n        match self.state {\n            GraphState::IndexOrdered =\u003e self\n                .vertices\n                .get_mut(index as usize)\n                .ok_or(GraphError(index)),\n            GraphState::SparseSorted =\u003e {\n                let found_index = self\n                    .vertices\n                    .binary_search_by(|vertex| vertex.index.cmp(\u0026index))\n                    .unwrap();\n                Ok(\u0026mut self.vertices[found_index])\n            }\n            _ =\u003e self\n                .vertices\n                .iter_mut()\n                .find(|vertex| vertex.index == index)\n                .ok_or(GraphError(index)),\n        }\n    }\n\n    pub fn add_arc(\u0026mut self, start: VertexIndex, end: VertexIndex) -\u003e Result\u003c(), GraphError\u003e {\n        self.get_vertex_mut(start)?.add_edge(end);\n        self.edge_number += 1;\n        Ok(())\n    }\n\n    pub fn add_edge(\u0026mut self, start: VertexIndex, end: VertexIndex) -\u003e Result\u003c(), GraphError\u003e {\n        self.add_arc(start, end)?;\n        self.add_arc(end, start)?;\n        Ok(())\n    }\n\n    pub fn lookup_edge(\u0026self, start: \u0026VertexIndex, end: \u0026VertexIndex) -\u003e bool {\n        let start = *start as usize;\n        debug_assert!(start \u003c self.size);\n        self.vertices[start].edges_to.binary_search(end).is_ok()\n    }\n\n    pub fn iterate_edges(\u0026self) -\u003e impl Iterator\u003cItem = (VertexIndex, VertexIndex)\u003e + '_ {\n        self.vertices\n            .iter()\n            .flat_map(|vertex| vertex.edges_to.iter().map(move |end| (vertex.index, *end)))\n    }\n\n    /// Remove unneccessary edges.\n    /// Does so by first sorting, thus trading runtime for reduced memory footprint.\n    pub fn minimize(\u0026mut self) {\n        // Adjust the edge number to fit, too.\n        self.edge_number = 0;\n        for vertex in self.vertices.iter_mut() {\n            vertex.edges_to.sort_unstable();\n            vertex.edges_to.dedup();\n            self.edge_number += vertex.edges_to.len();\n        }\n    }\n\n    pub fn set_colours(\u0026mut self, colours: \u0026[Colour]) -\u003e Result\u003c(), GraphError\u003e {\n        for (index, colour) in colours.iter().enumerate() {\n            self.get_vertex_mut(index as VertexIndex)?.colour = *colour;\n        }\n\n        Ok(())\n    }\n\n    #[cfg(test)]\n    pub fn order(\u0026mut self, order: \u0026[VertexIndex]) -\u003e Result\u003c(), GraphError\u003e {\n        let mut ordered_vertices = Vec::with_capacity(self.vertices.len());\n        for index in order {\n            let vertex = self.get_vertex(*index)?;\n            ordered_vertices.push(vertex.clone());\n        }\n\n        self.vertices = ordered_vertices;\n        self.state = GraphState::Fixed;\n        Ok(())\n    }\n\n    pub fn group_colours(\u0026mut self) {\n        use GraphState::*;\n        match self.state {\n            IndexOrdered =\u003e {\n                self.vertices.sort_by(|a, b| a.colour.cmp(\u0026b.colour));\n                self.state = ColourGroupedOrdered;\n            }\n            Chaos =\u003e {\n                self.vertices\n                    .sort_unstable_by(|a, b| a.colour.cmp(\u0026b.colour));\n                self.state = ColourGrouped;\n            }\n            _ =\u003e (),\n        }\n    }\n\n    pub fn sort(\u0026mut self) {\n        if self.state == GraphState::SparseSorted {\n            return;\n        }\n\n        if self.state != GraphState::IndexOrdered {\n            self.vertices.sort_unstable();\n            for vertex in self.vertices.iter_mut() {\n                vertex.edges_to.sort_unstable();\n            }\n            self.state = GraphState::IndexOrdered;\n        }\n    }\n\n    pub fn induce_subgraph(\n        \u0026self,\n        remaining_vertices: \u0026[VertexIndex],\n        vertex_list_sorted: bool,\n    ) -\u003e Result\u003cSelf, GraphError\u003e {\n        let mut subgraph = Self::new_with_indices(remaining_vertices, vertex_list_sorted);\n\n        for vertex in self.vertices.iter() {\n            let include = {\n                if vertex_list_sorted {\n                    remaining_vertices.binary_search(\u0026vertex.index).is_ok()\n                } else {\n                    remaining_vertices.contains(\u0026vertex.index)\n                }\n            };\n\n            if include {\n                let new_vertex = subgraph.get_vertex_mut(vertex.index)?;\n                new_vertex.colour = vertex.colour;\n                let sub_edges = vertex\n                    .edges_to\n                    .iter()\n                    .cloned()\n                    .filter(|vertex| {\n                        if vertex_list_sorted {\n                            remaining_vertices.binary_search(vertex).is_ok()\n                        } else {\n                            remaining_vertices.contains(vertex)\n                        }\n                    })\n                    .collect();\n                new_vertex.edges_to = sub_edges;\n            }\n        }\n\n        let sub_edge_number = subgraph.iterate_edges().count();\n        subgraph.edge_number = sub_edge_number;\n\n        Ok(subgraph)\n    }\n\n    pub fn recolor(\u0026mut self, vertex: VertexIndex) -\u003e Result\u003c(), GraphError\u003e {\n        let next_color = self.max_color;\n        self.max_color = next_color + 1;\n        let vertex = self.get_vertex_mut(vertex)?;\n        vertex.colour = next_color;\n        Ok(())\n    }\n}\n\nimpl Vertex {\n    pub fn new(index: VertexIndex, colour: Colour) -\u003e Self {\n        Vertex {\n            index,\n            edges_to: Vec::new(),\n            colour,\n        }\n    }\n\n    pub fn add_edge(\u0026mut self, end: VertexIndex) {\n        self.edges_to.push(end);\n    }\n}\n\nimpl PartialOrd for Vertex {\n    fn partial_cmp(\u0026self, other: \u0026Self) -\u003e Option\u003cstd::cmp::Ordering\u003e {\n        Some(self.index.cmp(\u0026other.index))\n    }\n}\n\nimpl Ord for Vertex {\n    fn cmp(\u0026self, other: \u0026Self) -\u003e std::cmp::Ordering {\n        self.index.cmp(\u0026other.index)\n    }\n}\n\n#[cfg(test)]\nmod test {\n    use super::*;\n\n    #[test]\n    fn new_graph_default() {\n        let graph = Graph::new_ordered(120);\n        assert!(graph.is_sparse());\n        for (index, vertex) in graph.vertices.iter().enumerate() {\n            assert_eq!(index as VertexIndex, vertex.index);\n            assert_eq!(DEFAULT_COLOR, vertex.colour);\n            assert!(vertex.edges_to.is_empty());\n        }\n    }\n\n    #[test]\n    fn test_set_vertex() {\n        let mut graph = Graph::new_ordered(5);\n        assert_eq!(5, graph.size());\n        assert_eq!(GraphState::IndexOrdered, graph.state);\n\n        // First with IndexOrdered\n\n        // In bounds\n        let valid_vertex = Vertex::new(2, 45);\n        assert_eq!(Ok(()), graph.set_vertex(valid_vertex.clone()));\n\n        // Negative index\n        let negative_vertex = Vertex::new(-23, 9);\n        assert_eq!(Err(GraphError(-23)), graph.set_vertex(negative_vertex));\n\n        // Index out of bounds\n        let oob_vertex = Vertex::new(5, 124);\n        assert_eq!(Err(GraphError(5)), graph.set_vertex(oob_vertex));\n\n        // Then with another state\n        graph.state = GraphState::Chaos;\n\n        // In bounds\n        let valid_vertex_chaos = Vertex::new(3, 50);\n        assert_eq!(Ok(()), graph.set_vertex(valid_vertex_chaos.clone()));\n\n        // Negative index\n        let negative_vertex_chaos = Vertex::new(-120, 9);\n        assert_eq!(\n            Err(GraphError(-120)),\n            graph.set_vertex(negative_vertex_chaos)\n        );\n\n        // Index out of bounds\n        let oob_vertex_chaos = Vertex::new(5, 124);\n        assert_eq!(Err(GraphError(5)), graph.set_vertex(oob_vertex_chaos));\n\n        assert_eq!(graph.vertices[0], Vertex::new(0, DEFAULT_COLOR));\n        assert_eq!(graph.vertices[1], Vertex::new(1, DEFAULT_COLOR));\n        assert_eq!(graph.vertices[2], valid_vertex);\n        assert_eq!(graph.vertices[3], valid_vertex_chaos);\n        assert_eq!(graph.vertices[4], Vertex::new(4, DEFAULT_COLOR));\n    }\n\n    #[test]\n    fn test_get_vertex() -\u003e Result\u003c(), GraphError\u003e {\n        let mut graph = Graph::new_ordered(5);\n        assert_eq!(5, graph.size());\n        assert_eq!(GraphState::IndexOrdered, graph.state);\n\n        // First with IndexOrdered\n\n        // In bounds\n        let valid_result = graph.get_vertex_mut(2)?;\n        assert_eq!(\u0026mut Vertex::new(2, DEFAULT_COLOR), valid_result);\n\n        // Negative index\n        assert_eq!(Err(GraphError(-3)), graph.get_vertex_mut(-3));\n\n        // Index out of bounds\n        assert_eq!(Err(GraphError(5)), graph.get_vertex_mut(5));\n\n        // Then with another state\n        graph.state = GraphState::Chaos;\n\n        // In bounds\n        let valid_result = graph.get_vertex_mut(3)?;\n        assert_eq!(\u0026mut Vertex::new(3, DEFAULT_COLOR), valid_result);\n\n        // Negative index\n        assert_eq!(Err(GraphError(-1)), graph.get_vertex_mut(-1));\n\n        // Index out of bounds\n        assert_eq!(Err(GraphError(5)), graph.get_vertex_mut(5));\n\n        Ok(())\n    }\n\n    #[test]\n    fn test_induce_subgraph() -\u003e Result\u003c(), GraphError\u003e {\n        let mut graph = Graph::new_ordered(5);\n        for i in 0..4 {\n            graph.add_edge(i, i + 1)?;\n        }\n\n        let vertex_subset = vec![1, 3, 4];\n\n        let mut expected_subgraph = Graph::new_with_indices(\u0026vertex_subset, true);\n        expected_subgraph.add_edge(3, 4)?;\n\n        assert_eq!(\n            expected_subgraph,\n            graph.induce_subgraph(\u0026vertex_subset, true)?\n        );\n\n        Ok(())\n    }\n}\n","traces":[{"line":34,"address":[741184],"length":1,"stats":{"Line":1},"fn_name":"size"},{"line":35,"address":[741189],"length":1,"stats":{"Line":1},"fn_name":null},{"line":38,"address":[741200],"length":1,"stats":{"Line":1},"fn_name":"number_edges"},{"line":39,"address":[741205],"length":1,"stats":{"Line":1},"fn_name":null},{"line":42,"address":[741216],"length":1,"stats":{"Line":1},"fn_name":"is_sparse"},{"line":46,"address":[741225,741348],"length":1,"stats":{"Line":1},"fn_name":null},{"line":50,"address":[741392],"length":1,"stats":{"Line":1},"fn_name":"update_max_color"},{"line":51,"address":[741413],"length":1,"stats":{"Line":1},"fn_name":null},{"line":52,"address":[741428],"length":1,"stats":{"Line":1},"fn_name":null},{"line":56,"address":[741857,741440],"length":1,"stats":{"Line":1},"fn_name":"new_ordered"},{"line":57,"address":[741470],"length":1,"stats":{"Line":1},"fn_name":null},{"line":58,"address":[741852,741595,741781,741485],"length":1,"stats":{"Line":5},"fn_name":null},{"line":59,"address":[741810],"length":1,"stats":{"Line":1},"fn_name":null},{"line":66,"address":[],"length":0,"stats":{"Line":0},"fn_name":null},{"line":70,"address":[742305,741872],"length":1,"stats":{"Line":1},"fn_name":"new_with_indices"},{"line":71,"address":[741938],"length":1,"stats":{"Line":1},"fn_name":null},{"line":72,"address":[742060,742250,742179,741974],"length":1,"stats":{"Line":4},"fn_name":null},{"line":73,"address":[742208],"length":1,"stats":{"Line":1},"fn_name":null},{"line":77,"address":[742160],"length":1,"stats":{"Line":1},"fn_name":null},{"line":79,"address":[742340,742259],"length":1,"stats":{"Line":1},"fn_name":null},{"line":84,"address":[],"length":0,"st DGE, SETWORDSNEEDED};\nuse std::{convert::TryInto, os::raw::c_int};\n\nuse super::{Colour, Graph, GraphState, VertexIndex};\nuse crate::debug::bin_fmt;\n\nfn encode_colours(partition: \u0026mut [Colour]) {\n    let mut last_colour = c_int::MIN; // Negative numbers should not arise or if they do, they should be bigger than this.\n    for colour in partition.iter_mut().rev() {\n        if *colour != last_colour {\n            last_colour = *colour;\n            *colour = 0;\n        } else {\n            *colour = 1;\n        }\n    }\n}\n\n#[derive(Debug, Clone)]\npub struct NautyGraph {\n    /// actual graph\n    #[debug(with = \"bin_fmt\")]\n    pub adjacency_matrix: Vec\u003cu64\u003e,\n    /// lab\n    pub vertex_order: Vec\u003cVertexIndex\u003e,\n    /// ptn aka the colouring\n    pub partition: Vec\u003cVertexIndex\u003e,\n}\n\n#[derive(Debug)]\npub struct TracesGraph {\n    /// actual graph\n    pub sparse_graph: SparseGraph,\n    /// lab\n    pub vertex_order: Vec\u003cVertexIndex\u003e,\n    /// ptn aka the colouring\n    pub partition: Vec\u003cVertexIndex\u003e,\n}\n\npub type SparseNautyGraph = TracesGraph;\n\nimpl NautyGraph {\n    pub fn from_graph(graph: \u0026mut Graph) -\u003e NautyGraph {\n        let n = graph.size();\n        let m = SETWORDSNEEDED(n);\n\n        let mut nauty_graph = NautyGraph {\n            adjacency_matrix: empty_graph(m, n),\n            vertex_order: Vec::with_capacity(n),\n            partition: Vec::with_capacity(n),\n        };\n\n        if graph.state != GraphState::Fixed {\n            graph.sort();\n            graph.group_colours();\n        }\n\n        for vertex in graph.vertices.iter() {\n            nauty_graph.vertex_order.push(vertex.index);\n\n            nauty_graph.partition.push(vertex.colour);\n\n            for end in vertex.edges_to.iter() {\n                ADDONEEDGE(\n                    \u0026mut nauty_graph.adjacency_matrix,\n                    vertex.index as usize,\n                    *end as usize,\n                    m,\n                );\n            }\n        }\n\n        encode_colours(\u0026mut nauty_graph.partition);\n\n        nauty_graph\n    }\n\n    pub fn check_valid(\u0026self) -\u003e bool {\n        let n = self.partition.len();\n        let m = SETWORDSNEEDED(n);\n\n        self.adjacency_matrix.len() == n * m \u0026\u0026 self.vertex_order.len() == n\n    }\n\n    pub fn graph_repr_sizes(\u0026self) -\u003e (usize, usize) {\n        let n = self.partition.len();\n        (n, SETWORDSNEEDED(n))\n    }\n}\n\nimpl TracesGraph {\n    pub fn from_graph(graph: \u0026mut Graph) -\u003e TracesGraph {\n        let number_vertices = graph.size();\n        let number_edges = graph.number_edges();\n\n        let mut traces_graph = TracesGraph {\n            sparse_graph: SparseGraph::new(number_vertices, number_edges),\n            vertex_order: Vec::with_capacity(number_vertices),\n            partition: Vec::with_capacity(number_vertices),\n        };\n\n        if graph.state != GraphState::Fixed {\n            graph.sort();\n            graph.group_colours();\n        }\n\n        // Encode order and colors\n        for vertex in graph.vertices.iter() {\n            traces_graph.vertex_order.push(vertex.index);\n            traces_graph.partition.push(vertex.colour);\n        }\n        encode_colours(\u0026mut traces_graph.partition);\n\n        // Encode graph. Vertices must be ordered with increasing indices.\n        let mut edge_counter = 0usize;\n        for (index, vertex) in graph.vertices.iter().sorted().enumerate() {\n            debug_assert_eq!(index as i32, vertex.index);\n            traces_graph.sparse_graph.d[index] = vertex.edges_to.len().try_into().unwrap();\n            traces_graph.sparse_graph.v[index] = edge_counter.try_into().unwrap();\n\n            for end in vertex.edges_to.iter() {\n                traces_graph.sparse_graph.e[edge_counter] = *end;\n                edge_counter += 1;\n            }\n        }\n\n        traces_graph\n    }\n}\n\n#[cfg(test)]\nmod test {\n    use nauty_Traces_sys::{\n        densenauty, optionblk, statsblk, Traces, TracesOptions, TracesStats, FALSE,\n    };\n\n    use crate::graph::GraphError;\n\n    use super::*;\n\n    #[test]\n    fn correct_nauty_repr() -\u003e Result\u003c(), GraphError\u003e {\n        let mut graph = Graph::new_ordered(8);\n        graph.add_edge(0, 1)?;\n        graph.add_edge(0, 3)?;\n        graph.add_edge(0, 4)?;\n        graph.add_edge(1, 2)?;\n        graph.add_edge(1, 5)?;\n        graph.add_edge(2, 3)?;\n        graph.add_edge(2, 6)?;\n        graph.add_edge(3, 7)?;\n        graph.add_edge(4, 5)?;\n        graph.add_edge(4, 7)?;\n        graph.add_edge(5, 6)?;\n        graph.add_edge(6, 7)?;\n\n        let order = [2, 0, 1, 3, 4, 5, 6, 7];\n        let colours = [2, 2, 1, 2, 2, 2, 2, 2];\n        graph.set_colours(\u0026colours)?;\n        graph.order(\u0026order)?;\n\n        let mut nauty_graph = NautyGraph::from_graph(\u0026mut graph);\n        assert_eq!(nauty_graph.vertex_order, order);\n        assert_eq!(nauty_graph.partition, [0, 1, 1, 1, 1, 1, 1, 0]);\n        assert!(nauty_graph.check_valid());\n        assert_eq!(nauty_graph.graph_repr_sizes(), (8, 1));\n\n        let mut options = optionblk::default();\n        options.writeautoms = FALSE;\n        options.defaultptn = FALSE;\n        let mut stats = statsblk::default();\n        let mut orbits = vec![0; 8];\n\n        unsafe {\n            densenauty(\n                nauty_graph.adjacency_matrix.as_mut_ptr(),\n                nauty_graph.vertex_order.as_mut_ptr(),\n                nauty_graph.partition.as_mut_ptr(),\n                orbits.as_mut_ptr(),\n                \u0026mut options,\n                \u0026mut stats,\n                1,\n                8,\n                std::ptr::null_mut(),\n            );\n        }\n\n        assert_eq!(orbits, [0, 1, 2, 1, 4, 0, 1, 0]);\n        Ok(())\n    }\n\n    #[test]\n    fn correct_nauty_repr2() -\u003e Result\u003c(), GraphError\u003e {\n        let mut graph = Graph::new_ordered(8);\n        graph.add_edge(0, 1)?;\n        graph.add_edge(0, 3)?;\n        graph.add_edge(0, 4)?;\n        graph.add_edge(1, 2)?;\n        graph.add_edge(1, 5)?;\n        graph.add_edge(2, 3)?;\n        graph.add_edge(2, 6)?;\n        graph.add_edge(3, 7)?;\n        graph.add_edge(4, 5)?;\n        graph.add_edge(4, 7)?;\n        graph.add_edge(5, 6)?;\n        graph.add_edge(6, 7)?;\n\n        let mut nauty_graph = NautyGraph::from_graph(\u0026mut graph);\n        assert_eq!(nauty_graph.vertex_order, [0, 1, 2, 3, 4, 5, 6, 7]);\n        assert_eq!(nauty_graph.partition, [1, 1, 1, 1, 1, 1, 1, 0]);\n        assert!(nauty_graph.check_valid());\n        assert_eq!(nauty_graph.graph_repr_sizes(), (8, 1));\n\n        let mut options = optionblk::default();\n        options.writeautoms = FALSE;\n        let mut stats = statsblk::default();\n        let mut orbits = vec![0; 8];\n\n        unsafe {\n            densenauty(\n                nauty_graph.adjacency_matrix.as_mut_ptr(),\n                nauty_graph.vertex_order.as_mut_ptr(),\n                nauty_graph.partition.as_mut_ptr(),\n                orbits.as_mut_ptr(),\n                \u0026mut options,\n                \u0026mut stats,\n                1,\n                8,\n                std::ptr::null_mut(),\n            );\n        }\n\n        assert_eq!(orbits, [0, 0, 0, 0, 0, 0, 0, 0]);\n        Ok(())\n    }\n\n    #[test]\n    fn correct_traces_repr() -\u003e Result\u003c(), GraphError\u003e {\n        let mut graph = Graph::new_ordered(8);\n        graph.add_edge(0, 1)?;\n        graph.add_edge(0, 3)?;\n        graph.add_edge(0, 4)?;\n        graph.add_edge(1, 2)?;\n        graph.add_edge(1, 5)?;\n        graph.add_edge(2, 3)?;\n        graph.add_edge(2, 6)?;\n        graph.add_edge(3, 7)?;\n        graph.add_edge(4, 5)?;\n        graph.add_edge(4, 7)?;\n        graph.add_edge(5, 6)?;\n        graph.add_edge(6, 7)?;\n\ o read\n//! graphs from stdin. Uses similar commands\n//! as dreadnaut.\n\nuse std::{\n    env::current_dir,\n    fs::File,\n    io::{self, BufReader, Stdin, Write},\n    path::PathBuf,\n};\nuse structopt::StructOpt;\n\nuse crate::{\n    graph::{Graph, VertexIndex},\n    misc::CoreMetric,\n    parser::{parse_csv_input, parse_dreadnaut_input, parse_txt_input},\n    statistics::{Statistics, StatisticsLevel},\n    Error, MetricUsed, NautyTraces, Settings,\n};\n\n#[derive(StructOpt, Debug)]\n#[structopt(name = \"DQG\")]\nstruct CommandLineOptions {\n    /// Test whole powerset of the generators.\n    #[structopt(short = \"-p\", long)]\n    iter_powerset: bool,\n    /// Read a file from command line.\n    #[structopt(short = \"-m\", long)]\n    read_memory_pipe: bool,\n    /// Outputs orbits in dreadnaut format.\n    #[structopt(short = \"-o\", long)]\n    output_orbits: bool,\n    /// Logs all orbit sizes in a HashMap.\n    #[structopt(short = \"-l\", long)]\n    log_orbits: bool,\n    /// Print formula instead of solving it.\n    #[structopt(short = \"-f\", long)]\n    print_formula: bool,\n    /// Graph is colored and colors should be\n    /// included in the nauty computation.\n    #[structopt(short = \"-c\", long)]\n    colored_graph: bool,\n    /// Use traces instead of nauty to compute\n    /// the graphs automorphism group.\n    #[structopt(short = \"-t\", long)]\n    use_traces: bool,\n    /// Use nondescriptive cores and the metric\n    /// to guide the search.\n    /// Possible values: recolor, pow_gen\n    #[structopt(short = \"-q\", long)]\n    nondescriptive_core: Option\u003cCoreMetric\u003e,\n    /// Search in the whole automorphism group instead\n    /// of a set of generators.\n    #[structopt(short = \"-g\", long)]\n    search_group: bool,\n    /// Validate each descriptiveness result\n    /// with exhaustive search for consistent\n    /// transversals.\n    #[structopt(short = \"-v\", long)]\n    validate: bool,\n    /// Operate in GAP mode.\n    /// This means that DQG use GAP to\n    /// search in the conjugacy classes.\n    #[structopt(long)]\n    gap_mode: bool,\n    /// GIve graph size for file formats\n    /// which don't contain the graph size.\n    #[structopt(short = \"-n\", long)]\n    graph_size: Option\u003cusize\u003e,\n    /// Use the given metric to find the \"best\" quotient\n    /// and use it as described by the other flags.\n    /// Possible value: least_orbits, biggest_orbit, sparsity\n    #[structopt(long)]\n    metric: Option\u003cMetricUsed\u003e,\n    /// Evaluate a log file as printed by\n    /// the quotientPlanning tool.\n    #[structopt(long, parse(from_os_str))]\n    evaluate: Option\u003cPathBuf\u003e,\n    /// Level of detail for statistics.\n    /// None if left out, basic if `-s`, full for more than one `-s`.\n    #[structopt(short = \"-s\", parse(from_occurrences = StatisticsLevel::from))]\n    statistics_level: StatisticsLevel,\n    /// The input file to read from. Optional.\n    /// Same path will be used for output.\n    /// Reads through CLI if not specified.\n    #[structopt(parse(from_os_str))]\n    input: Option\u003cPathBuf\u003e,\n}\n\n#[cfg(not(tarpaulin_include))]\nfn read_graph_empty(stdin: \u0026Stdin) -\u003e Result\u003cGraph, io::Error\u003e {\n    let mut buffer = String::new();\n    let number_of_vertices;\n\n    println!(\"Input graph size:\");\n    loop {\n        print!(\"n=\");\n        io::stdout().flush()?;\n        stdin.read_line(\u0026mut buffer)?;\n\n        match buffer.trim().parse::\u003cusize\u003e() {\n            Ok(n) =\u003e {\n                number_of_vertices = n;\n                break;\n            }\n            Err(_) =\u003e println!(\"Please insert only natural numbers in decimal!\"),\n        }\n\n        buffer.clear();\n    }\n\n    Ok(Graph::new_ordered(number_of_vertices))\n}\n\n#[cfg(not(tarpaulin_include))]\nfn read_vertex(index: VertexIndex, graph: \u0026mut Graph, stdin: \u0026Stdin) -\u003e Result\u003cbool, Error\u003e {\n
