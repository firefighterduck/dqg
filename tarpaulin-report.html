"Line":1},"fn_name":null},{"line":274,"address":[736235],"length":1,"stats":{"Line":1},"fn_name":null},{"line":276,"address":[736132,736051,735950],"length":1,"stats":{"Line":3},"fn_name":null}],"covered":73,"coverable":73},{"path":["/","__w","dqg","dqg","src","statistics.rs"],"content":"//! Statistics about different parts of the program.\n\nuse custom_debug_derive::Debug;\nuse std::{\n    collections::HashMap,\n    fs::File,\n    io::Write,\n    path::PathBuf,\n    time::{Duration, Instant},\n};\n\nuse crate::{\n    debug::{opt_fmt, result_fmt},\n    encoding::OrbitEncoding,\n    Error,\n};\n\n#[derive(Debug, PartialEq, Eq)]\npub enum StatisticsLevel {\n    None,\n    Basic,\n    Full,\n}\n\nimpl From\u003cu64\u003e for StatisticsLevel {\n    #[cfg(not(tarpaulin_include))]\n    fn from(level: u64) -\u003e Self {\n        match level {\n            0 =\u003e Self::None,\n            1 =\u003e Self::Basic,\n            _ =\u003e Self::Full,\n        }\n    }\n}\n\n/// Counts how many orbits have the same size.\n/// Stores the as a map from orbit size to number\n/// of orbits with this size.\n#[derive(Default)]\npub struct OrbitStatistics {\n    pub orbit_sizes: HashMap\u003cusize, usize\u003e,\n}\n\nimpl OrbitStatistics {\n    #[cfg(not(tarpaulin_include))]\n    pub fn log_orbit(\u0026mut self, orbit: \u0026OrbitEncoding) {\n        let orbit_size = orbit.1.len();\n        match self.orbit_sizes.get_mut(\u0026orbit_size) {\n            Some(number) =\u003e *number += 1,\n            None =\u003e {\n                self.orbit_sizes.insert(orbit_size, 1);\n            }\n        };\n    }\n}\n\n#[derive(Debug)]\npub struct QuotientStatistics {\n    pub quotient_size: usize,\n    #[debug(with = \"opt_fmt\")]\n    pub core_size: Option\u003cusize\u003e,\n    pub max_orbit_size: usize,\n    pub min_orbit_size: usize,\n    #[debug(with = \"result_fmt\")]\n    pub descriptive: Result\u003cbool, Error\u003e,\n    #[debug(with = \"opt_fmt\")]\n    pub validated: Option\u003cbool\u003e,\n    pub quotient_handling_time: Duration,\n    pub kissat_time: Duration,\n    pub orbit_gen_time: Duration,\n    pub quotient_gen_time: Duration,\n    pub encoding_time: Duration,\n    pub orbit_sizes: OrbitStatistics,\n}\n\n#[derive(Debug)]\npub struct Statistics {\n    // Meta information\n    #[debug(skip)]\n    level: StatisticsLevel,\n    #[debug(skip)]\n    out_file: PathBuf,\n    pub exhausted: bool,\n    // Timings\n    #[debug(skip)]\n    pub start_time: Instant,\n    #[debug(with = \"opt_fmt\")]\n    nauty_done_time: Option\u003cDuration\u003e,\n    #[debug(with = \"opt_fmt\")]\n    gap_done_time: Option\u003cDuration\u003e,\n    #[debug(with = \"opt_fmt\")]\n    end_time: Option\u003cDuration\u003e,\n    #[debug(with = \"opt_fmt\")]\n    graph_sort_time: Option\u003cDuration\u003e,\n    // Graph statistics\n    graph_size: usize,\n    group_size: f64,\n    iteration_counter: usize,\n    descriptive_found: bool,\n    #[debug(with = \"opt_fmt\")]\n    number_of_generators: Option\u003cusize\u003e,\n    max_orbit_size: usize,\n    max_quotient_graph_size: usize,\n    #[debug(with = \"opt_fmt\")]\n    max_quotient_handling_time: Option\u003cDuration\u003e,\n    #[debug(with = \"opt_fmt\")]\n    max_kissat_time: Option\u003cDuration\u003e,\n    quotient_statistics: Vec\u003cQuotientStatistics\u003e,\n}\n\nimpl Statistics {\n    #[cfg(not(tarpaulin_include))]\n    pub fn new(level: StatisticsLevel, out_file: PathBuf, graph_size: usize) -\u003e Self {\n        debug_assert!(level != StatisticsLevel::None);\n\n        Statistics {\n            level,\n            out_file,\n            start_time: Instant::now(),\n            exhausted: false,\n            nauty_done_time: None,\n            gap_done_time: None,\n            end_time: None,\n            graph_sort_time: None,\n            graph_size,\n            group_size: 0.,\n            iteration_counter: 0,\n            descriptive_found: false,\n            number_of_generators: None,\n            max_orbit_size: 0,\n            max_quotient_graph_size: 0,\n            max_quotient_handling_time: None,\n            max_kissat_time: None,\n            quotient_statistics: Vec::new(),\n        }\n    }\n\n    #[cfg(not(tarpaulin_include))]\n    pub fn log_iteration(\u0026mut self) {\n        self.iteration_counter += 1;\n    }\n\n    #[cfg(not(tarpaulin_include))]\n    pub fn log_group_size(\u0026mut self, base: f64, mantisse: i32) {\n        use num::traits::Pow;\n\n        self.group_size = base * 10f64.pow(mantisse);\n    }\n\n    #[cfg(not(tarpaulin_include))]\n    pub fn log_nauty_done(\u0026mut self) {\n        self.nauty_done_time = Some(self.start_time.elapsed());\n    }\n\n    #[cfg(not(tarpaulin_include))]\n    pub fn log_nauty_step(\u0026mut self, duration: Duration) {\n        Self::add_option_duration(\u0026mut self.nauty_done_time, duration);\n    }\n\n    #[cfg(not(tarpaulin_include))]\n    pub fn log_gap_done(\u0026mut self, duration: Duration) {\n        self.gap_done_time = Some(duration);\n    }\n\n    #[cfg(not(tarpaulin_include))]\n    pub fn log_graph_sorted(\u0026mut self, duration: Duration) {\n        self.graph_sort_time = Some(duration);\n    }\n\n    #[cfg(not(tarpaulin_include))]\n    pub fn log_graph_sorted_step(\u0026mut self, duration: Duration) {\n        Self::add_option_duration(\u0026mut self.graph_sort_time, duration);\n    }\n\n    #[cfg(not(tarpaulin_include))]\n    pub fn log_end(\u0026mut self) {\n        self.end_time = Some(self.start_time.elapsed());\n    }\n\n    #[cfg(not(tarpaulin_include))]\n    pub fn log_number_of_generators(\u0026mut self, number_of_generators: usize) {\n        self.number_of_generators = Some(number_of_generators);\n    }\n\n    #[cfg(not(tarpaulin_include))]\n    pub fn log_quotient_statistic(\u0026mut self, quotient_statistic: QuotientStatistics) {\n        self.descriptive_found |= matches!(quotient_statistic.descriptive, Ok(true));\n        self.max_orbit_size = self.max_orbit_size.max(quotient_statistic.max_orbit_size);\n        self.max_quotient_graph_size = self\n            .max_quotient_graph_size\n            .max(quotient_statistic.quotient_size);\n        self.max_quotient_handling_time = if let Some(qh_time) = self.max_quotient_handling_time {\n            Some(qh_time.max(quotient_statistic.quotient_handling_time))\n        } else {\n            Some(quotient_statistic.quotient_handling_time)\n        };\n        self.max_kissat_time = if let Some(ks_time) = self.max_kissat_time {\n            Some(ks_time.max(quotient_statistic.kissat_time))\n        } else {\n            Some(quotient_statistic.kissat_time)\n        };\n\n        if self.level == StatisticsLevel::Full {\n            self.quotient_statistics.push(quotient_statistic);\n        }\n    }\n\n    #[cfg(not(tarpaulin_include))]\n    fn add_option_duration(old: \u0026mut Option\u003cDuration\u003e, new: Duration) {\n        match old {\n            Some(old) =\u003e *old += new,\n            None =\u003e *old = Some(new),\n        }\n    }\n\n    #[cfg(not(tarpaulin_include))]\n    pub fn save_statistics(\u0026self) -\u003e Result\u003c(), Error\u003e {\n        let mut statistics_file = File::create(\u0026self.out_file)?;\n        write!(statistics_file, \"Raw Statistics: {:#?}\", self).map_err(Error::from)\n    }\n}\n","traces":[],"covered":0,"coverable":0},{"path":["/","__w","dqg","dqg","src","transversal.rs"],"content":"use crate::{\n    encoding::QuotientGraphEncoding,\n    graph::{Graph, VertexIndex},\n};\n\npub fn is_transversal_consistent(\n    transversal: \u0026[(VertexIndex, VertexIndex)],\n    graph: \u0026Graph,\n    quotient: QuotientGraphEncoding,\n) -\u003e bool {\n    for edge in quotient.0.iter() {\n        let start = transversal[transversal\n            .binary_search_by(|(orbit, _)| orbit.cmp(\u0026edge.0))\n            .expect(\"Transversal didn't contain orbit!\")]\n        .1;\n        let end = transversal[transversal\n            .binary_search_by(|(orbit, _)| orbit.cmp(\u0026edge.1))\n            .expect(\"Transversal didn't contain orbit!\")]\n        .1;\n\n        if !graph.lookup_edge(\u0026start, \u0026end) {\n            return false;\n        }\n    }\n\n    true\n}\n\n#[cfg(test)]\nmod test {\n    use super::*;\n    use crate::{encoding::EdgeEncoding, Error};\n\n    #[test]\n    fn test_is_transversal_consistent_true() -\u003e Result\u003c(), Error\u003e {\n        let mut graph = Graph::new_ordered(8);\n        graph.add_edge(0, 1)?;\n        graph.add_edge(0, 3)?;\n        graph.add_edge(0, 4)?;\n        graph.add_edge(1, 2)?;\n        graph.add_edge(1, 5)?;\n        graph.add_edge(2, 3)?;\n        graph.add_edge(2, 6)?;\n        graph.add_edge(3, 7)?;\n        graph.add_edge(4, 5)?;\n        graph.add_edge(4, 7)?;\n        graph.add_edge(5, 6)?;\n        graph.add_edge(6, 7)?;\n\n        let quotient1: QuotientGraphEncoding = QuotientGraphEncoding(\n            vec![EdgeEncoding(0, 2)],\n            vec![(0, vec![0, 1, 4, 5]), (2, vec![2, 3, 6, 7])],\n        );\n        let transversal1_1 = vec![(0, 0), (2, 3)];\n        assert!(is_transversal_consistent(\n            \u0026transversal1_1,\n            \u0026graph,\n            quotient1.clone()\n        ));\n        let transversal1_2 = vec![(0, 5), (2, 6)];\n        assert!(is_transversal_consistent(\n            \u0026transversal1_2,\n            \u0026graph,\n            quotient1.clone()\n        ));\n        let transversal1_3 = vec![(0, 0), (2, 6)];\n        assert!(!is_transversal_consistent(\n            \u0026transversal1_3,\n            \u0026graph,\n            quotient1.clone()\n        ));\n\n        let quotient2: QuotientGraphEncoding = QuotientGraphEncoding(\n            vec![EdgeEncoding(0, 1), EdgeEncoding(0, 4), EdgeEncoding(1, 2)],\n            vec![\n                (0, vec![0, 5, 7]),\n                (1, vec![1, 3, 6]),\n                (2, vec![2]),\n                (4, vec![4]),\n            ],\n        );\n        let transversal2_1 = vec![(0, 0), (1, 1), (2, 2), (4, 4)];\n        assert!(is_transversal_consistent(\n            \u0026transversal2_1,\n            \u0026graph,\n            quotient2.clone()\n        ));\n        let transversal2_2 = vec![(0, 5), (1, 6), (2, 2), (4, 4)];\n        assert!(is_transversal_consistent(\n            \u0026transversal2_2,\n            \u0026graph,\n            quotient2.clone()\n        ));\n        let transversal2_3 = vec![(0, 0), (1, 6), (2, 2), (4, 4)];\n        assert!(!is_transversal_consistent(\n            \u0026transversal2_3,\n            \u0026graph,\n            quotient2.clone()\n        ));\n\n        Ok(())\n    }\n\n    #[test]\n    fn test_is_transversal_consistent_false() -\u003e Result\u003c(), Error\u003e {\n        let mut graph = Graph::new_ordered(8);\n        graph.add_edge(0, 1)?;\n        graph.add_edge(0, 4)?;\n        graph.add_edge(1, 7)?;\n        graph.add_edge(2, 3)?;\n        graph.add_edge(2, 6)?;\n        graph.add_edge(3, 6)?;\n        graph.add_edge(4, 5)?;\n        graph.add_edge(6, 7)?;\n\n        let quotient: QuotientGraphEncoding = QuotientGraphEncoding(\n            vec![\n                EdgeEncoding(0, 1),\n                EdgeEncoding(0, 4),\n                EdgeEncoding(1, 5),\n                EdgeEncoding(4, 5),\n            ],\n            vec![\n                (0, vec![0, 2]),\n                (1, vec![1, 3]),\n                (4, vec![4, 6]),\n                (5, vec![5, 7]),\n            ],\n        );\n\n        for pick0 in [0, 2] {\n            for pick1 in [1, 3] {\n                for pick4 in [4, 6] {\n                    for pick5 in [5, 7] {\n                        let transversal = vec![(0, pick0), (1, pick1), (4, pick4), (5, pick5)];\n                        assert!(!is_transversal_consistent(\n                            \u0026transversal,\n                            \u0026graph,\n                            quotient.clone()\n                        ));\n     <script>const e = React.createElement;

function pathToString(path) {
  if (path[0] === '/') {
    return '/' + path.slice(1).join('/');
  } else {
    return path.join('/');
  }
}

function findCommonPath(files) {
  if (!files || !files.length) {
    return [];
  }

  function isPrefix(arr, prefix) {
    if (arr.length < prefix.length) {
      return false;
    }
    for (let i = prefix.length - 1; i >= 0; --i) {
      if (arr[i] !== prefix[i]) {
        return false;
      }
    }
    return true;
  }

  let commonPath = files[0].path.slice(0, -1);
  while (commonPath.length) {
    if (files.every(file => isPrefix(file.path, commonPath))) {
      break;
    }
    commonPath.pop();
  }
  return commonPath;
}

function findFolders(files) {
  if (!files || !files.length) {
    return [];
  }

  let folders = files.filter(file => file.path.length > 1).map(file => file.path[0]);
  folders = [...new Set(folders)]; // unique
  folders.sort();

  folders = folders.map(folder => {
    let filesInFolder = files
      .filter(file => file.path[0] === folder)
      .map(file => ({
        ...file,
        path: file.path.slice(1),
        parent: [...file.parent, file.path[0]],
      }));

    const children = findFolders(filesInFolder); // recursion

    return {
      is_folder: true,
      path: [folder],
      parent: files[0].parent,
      children,
      covered: children.reduce((sum, file) => sum + file.covered, 0),
      coverable: children.reduce((sum, file) => sum + file.coverable, 0),
      prevRun: {
        covered: children.reduce((sum, file) => sum + file.prevRun.covered, 0),
        coverable: children.reduce((sum, file) => sum + file.prevRun.coverable, 0),
      }
    };
  });

  return [
    ...folders,
    ...files.filter(file => file.path.length === 1),
  ];
}

class App extends React.Component {
  constructor(...args) {
    super(...args);

    this.state = {
      current: [],
    };
  }

  componentDidMount() {
    this.updateStateFromLocation();
    window.addEventListener("hashchange", () => this.updateStateFromLocation(), false);
  }

  updateStateFromLocation() {
    if (window.location.hash.length > 1) {
      const current = window.location.hash.substr(1).split('/');
      this.setState({current});
    } else {
      this.setState({current: []});
    }
  }

  getCurrentPath() {
    let file = this.props.root;
    let path = [file];
    for (let p of this.state.current) {
      file = file.children.find(file => file.path[0] === p);
      if (!file) {
        return path;
      }
      path.push(file);
    }
    return path;
  }

  render() {
    const path = this.getCurrentPath();
    const file = path[path.length - 1];

    let w = null;
    if (file.is_folder) {
      w = e(FilesList, {
        folder: file,
        onSelectFile: this.selectFile.bind(this),
        onBack: path.length > 1 ? this.back.bind(this) : null,
      });
    } else {
      w = e(DisplayFile, {
        file,
        onBack: this.back.bind(this),
      });
    }

    return e('div', {className: 'app'}, w);
  }

  selectFile(file) {
    this.setState(({current}) => {
      return {current: [...current, file.path[0]]};
    }, () => this.updateHash());
  }

  back(file) {
    this.setState(({current}) => {
      return {current: current.slice(0, current.length - 1)};
    }, () => this.updateHash());
  }

  updateHash() {
    if (!this.state.current || !this.state.current.length) {
      window.location = '#';
    } else {
      window.location = '#' + this.state.current.join('/');
    }
  }
}

function FilesList({folder, onSelectFile, onBack}) {
  let files = folder.children;
  return e('div', {className: 'display-folder'},
    e(FileHeader, {file: folder, onBack}),
    e('table', {className: 'files-list'},
      e('thead', {className: 'files-list__head'},
        e('tr', null,
          e('th', null, "Path"),
          e('th', null, "Coverage")
        )
      ),
      e('tbody', {className: 'files-list__body'},
        files.map(file => e(File, {file, onClick: onSelectFile}))
      )
    )
  );
}

function File({file, onClick}) {
  const coverage = file.coverable ? file.covered / file.coverable * 100 : -1;
  const coverageDelta = file.prevRun &&
    (file.covered / file.coverable * 100 - file.prevRun.covered / file.prevRun.coverable * 100);

  return e('tr', {
      className: 'files-list__file'
        + (coverage >= 0 && coverage < 50 ? ' files-list__file_low': '')
        + (coverage >= 50 && coverage < 80 ? ' files-list__file_medium': '')
        + (coverage >= 80 ? ' files-list__file_high': '')
        + (file.is_folder ? ' files-list__file_folder': ''),
      onClick: () => onClick(file),
    },
    e('td', null, pathToString(file.path)),
    e('td', null,
      file.covered + ' / ' + file.coverable +
      (coverage >= 0 ? ' (' + coverage.toFixed(2) + '%)' : ''),
      e('span', {title: 'Change from the previous run'},
        (coverageDelta ? ` (${coverageDelta > 0 ? '+' : ''}${coverageDelta.toFixed(2)}%)` : ''))
    )
  );
}

function DisplayFile({file, onBack}) {
  return e('div', {className: 'display-file'},
    e(FileHeader, {file, onBack}),
    e(FileContent, {file})
  );
}

function FileHeader({file, onBack}) {
  const coverage = file.covered / file.coverable * 100;
  const coverageDelta = file.prevRun && (coverage - file.prevRun.covered / file.prevRun.coverable * 100);

  return e('div', {className: 'file-header'},
    onBack ? e('a', {className: 'file-header__back', onClick: onBack}, 'Back') : null,
    e('div', {className: 'file-header__name'}, pathToString([...file.parent, ...file.path])),
    e('div', {className: 'file-header__stat'},
      'Covered: ' + file.covered + ' of ' + file.coverable +
      (file.coverable ? ' (' + coverage.toFixed(2) + '%)' : ''),
      e('span', {title: 'Change from the previous run'},
        (coverageDelta ? ` (${coverageDelta > 0 ? '+' : ''}${coverageDelta.toFixed(2)}%)` : ''))
    )
  );
}

function FileContent({file}) {
  return e('div', {className: 'file-content'},
    file.content.split(/\r?\n/).map((line, index) => {
      const trace = file.traces.find(trace => trace.line === index + 1);
      const covered = trace && trace.stats.Line;
      const uncovered = trace && !trace.stats.Line;
      return e('pre', {
          className: 'code-line'
            + (covered ? ' code-line_covered' : '')
            + (uncovered ? ' code-line_uncovered' : ''),
          title: trace ? JSON.stringify(trace.stats, null, 2) : null,
        }, line);
    })
  );
}

(function(){
  const commonPath = findCommonPath(data.files);
  const prevFilesMap = new Map();

  previousData && previousData.files.forEach((file) => {
    const path = file.path.slice(commonPath.length).join('/');
    prevFilesMap.set(path, file);
  });

  const files = data.files.map((file) => {
    const path = file.path.slice(commonPath.length);
    const { covered = 0, coverable = 0 } = prevFilesMap.get(path.join('/')) || {};
    return {
      ...file,
      path,
      parent: commonPath,
      prevRun: { covered, coverable },
    };
  });

  const children = findFolders(files);

  const root = {
    is_folder: true,
    children,
    path: commonPath,
    parent: [],
    covered: children.reduce((sum, file) => sum + file.covered, 0),
    coverable: children.reduce((sum, file) => sum + file.coverable, 0),
    prevRun: {
      covered: children.reduce((sum, file) => sum + file.prevRun.covered, 0),
      coverable: children.reduce((sum, file) => sum + file.prevRun.coverable, 0),
    }
  };

  ReactDOM.render(e(App, {root, prevFilesMap}), document.getElementById('root'));
}());
</script>
