ate::{evaluate_log_file, evaluate_logs};\n\nmod gap;\nuse gap::gap_mode;\n\nmod core;\nuse crate::core::search_with_core;\n\n#[cfg(not(tarpaulin_include))]\nfn compute_quotient_with_statistics(\n    generators_subset: \u0026mut [Permutation],\n    graph: \u0026Graph,\n    settings: \u0026mut Settings,\n) -\u003e bool {\n    let start_time = Instant::now();\n\n    time!(orbit_gen_time, orbits, generate_orbits(generators_subset));\n\n    let mut orbit_sizes = OrbitStatistics::default();\n    if settings.log_orbits {\n        for orbit in orbits.encode_high() {\n            orbit_sizes.log_orbit(\u0026orbit);\n        }\n    }\n\n    time!(\n        quotient_gen_time,\n        quotient_graph,\n        QuotientGraph::from_graph_orbits(graph, orbits)\n    );\n    let quotient_size = quotient_graph.quotient_graph.size();\n    let (min_orbit_size, max_orbit_size) = quotient_graph.get_orbit_sizes();\n\n    time!(\n        encoding_time,\n        encoded,\n        encode_problem(\u0026quotient_graph, graph)\n    );\n\n    let mut descriptive = Ok(true);\n    let mut validated = None;\n    let mut kissat_time = Duration::ZERO;\n\n    let return_val = if let Some((formula, dict)) = encoded {\n        time!(k_time, descriptive_validated, {\n            if settings.validate {\n                let sat_result = solve_validate(formula, dict);\n                match sat_result {\n                    Ok(transversal) =\u003e {\n                        if let Some(transversal) = transversal {\n                            (\n                                Ok(true),\n                                Some(is_transversal_consistent(\n                                    \u0026transversal,\n                                    graph,\n                                    quotient_graph.encode_high(),\n                                )),\n                            )\n                        } else {\n                            (Ok(false), None)\n                        }\n                    }\n                    Err(err) =\u003e (Err(err), None),\n                }\n            } else {\n                let descriptive = solve(formula);\n                (descriptive, None)\n            }\n        });\n        kissat_time = k_time;\n        descriptive = descriptive_validated.0;\n        validated = descriptive_validated.1;\n\n        matches!(descriptive, Ok(true))\n    } else {\n        // Trivially descriptive\n        true\n    };\n\n    let quotient_handling_time = start_time.elapsed();\n    let quotient_stats = QuotientStatistics {\n        quotient_size,\n        core_size: None,\n        max_orbit_size,\n        min_orbit_size,\n        descriptive,\n        validated,\n        quotient_handling_time,\n        kissat_time,\n        orbit_gen_time,\n        quotient_gen_time,\n        encoding_time,\n        orbit_sizes,\n    };\n    do_if_some(settings.get_stats(), |stats| {\n        stats.log_quotient_statistic(quotient_stats);\n        stats.log_iteration()\n    });\n\n    return_val\n}\n\n#[cfg(not(tarpaulin_include))]\nfn compute_quotient(\n    generators_subset: \u0026mut [Permutation],\n    graph: \u0026Graph,\n    settings: \u0026Settings,\n) -\u003e bool {\n    let orbits = generate_orbits(generators_subset);\n\n    let quotient_graph = QuotientGraph::from_graph_orbits(graph, orbits);\n\n    let formula = encode_problem(\u0026quotient_graph, graph);\n\n    if let Some((formula, dict)) = formula {\n        if settings.validate {\n            let transversal_result = solve_validate(formula, dict);\n            if let Some(transversal) = transversal_result.unwrap() {\n                assert!(is_transversal_consistent(\n                    \u0026transversal,\n                    graph,\n                    quotient_graph.encode_high()\n                ));\n                true\n            } else {\n                false\n            }\n        } else {\n            solve(formula).unwrap()\n        }\n    } else {\n        true\n    }\n}\n\n#[cfg(not(tarpaulin_include))]\nfn main() -\u003e Result\u003c(), Error\u003e {\n    // Read the graph from a file or via CLI and ...\n    let (mut graph, mut settings) = read_graph()?;\n\n    if let Some(eval_buf) = settings.evaluate {\n        let logs = evaluate_log_file(\u0026mut eval_buf.lines());\n        evaluate_logs(logs);\n        return Ok(());\n    }\n\n    // Search for a non descriptive core in a single non-descriptive quotient.\n    if settings.nondescriptive_core.is_some() {\n        return search_with_core(\u0026mut graph, \u0026mut settings);\n    }\n\n    if settings.search_group {\n        let nauty_graph = NautyGraph::from_graph(\u0026mut graph);\n        assert!(nauty_graph.check_valid());\n\n        search_group(\u0026mut graph, nauty_graph, \u0026mut settings);\n        return Ok(());\n    }\n\n    // ... compute the generators with nauty or Traces. Then ...\n    let mut generators = compute_generators(\u0026mut graph, \u0026mut settings);\n\n    do_if_some(settings.get_stats(), Statistics::log_nauty_done);\n    do_if_some(settings.get_stats(), |st| {\n        st.log_number_of_generators(generators.len())\n    });\n\n    // Sort the graph to allow easier lookup for edges.\n    time!(graph_sort_time, _t, graph.sort());\n    do_if_some(settings.get_stats(), |stats| {\n        stats.log_graph_sorted(graph_sort_time)\n    });\n\n    if settings.gap_mode {\n        return gap_mode(\u0026graph, generators, settings.get_stats());\n    }\n\n    // ... iterate over the specified subsets of generators...\n    if settings.get_stats().is_some() {\n        // ... with statistics ...\n        if settings.iter_powerset {\n            generators\n                .into_iter()\n                .powerset()\n                .skip(1)\n                .find_map(|mut subset| {\n                    if compute_quotient_with_statistics(\u0026mut subset, \u0026graph, \u0026mut settings) {\n                        Some(())\n                    } else {\n ering {\n        let left_biggest = left.get_orbit_sizes().1;\n        let right_biggest = right.get_orbit_sizes().1;\n        left_biggest.cmp(\u0026right_biggest).reverse()\n    }\n}\n\n/// The sparsest quotient\n/// has the highest priority.\n#[derive(Debug)]\npub struct Sparsity;\nimpl Metric for Sparsity {\n    #[cfg(not(tarpaulin_include))]\n    fn compare_quotients(left: \u0026QuotientGraph, right: \u0026QuotientGraph) -\u003e std::cmp::Ordering {\n        let left_sparsity_coefficient =\n            left.quotient_graph.number_edges() as f64 / left.quotient_graph.size() as f64;\n        let right_sparsity_coefficient =\n            right.quotient_graph.number_edges() as f64 / right.quotient_graph.size() as f64;\n        left_sparsity_coefficient\n            .partial_cmp(\u0026right_sparsity_coefficient)\n            .expect(\"Sparsity coefficients should be comparable\")\n    }\n}\n","traces":[],"covered":0,"coverable":0},{"path":["/","__w","dqg","dqg","src","misc.rs"],"content":"use std::{fs::File, io::BufReader, str::FromStr};\n\nuse crate::debug::MetricError;\nuse crate::statistics::Statistics;\nuse crate::{\n    metric::{BiggestOrbits, LeastOrbits, Metric, Sparsity},\n    quotient::QuotientGraph,\n};\n\n#[cfg(not(tarpaulin_include))]\n#[inline]\npub fn do_if_some\u003cF, T\u003e(optional: \u0026mut Option\u003cT\u003e, f: F)\nwhere\n    F: FnOnce(\u0026mut T),\n{\n    if let Some(val) = optional {\n        f(val);\n    }\n}\n\n#[derive(Debug)]\npub enum NautyTraces {\n    /// Calls dense nauty\n    Nauty,\n    /// Calls sparse nauty\n    SparseNauty,\n    /// Calls Traces (only for sparse graphs)\n    Traces,\n}\n\nimpl Default for NautyTraces {\n    fn default() -\u003e Self {\n        Self::Nauty\n    }\n}\n\n#[derive(Debug, Clone, Copy, PartialEq, Eq, Hash)]\npub enum MetricUsed {\n    LeastOrbits,\n    BiggestOrbits,\n    Sparsity,\n    Standard,\n}\n\nimpl MetricUsed {\n    #[cfg(not(tarpaulin_include))]\n    pub fn compare_quotients(\n        \u0026self,\n        left: \u0026QuotientGraph,\n        right: \u0026QuotientGraph,\n    ) -\u003e std::cmp::Ordering {\n        use std::cmp::Ordering;\n\n        match \u0026self {\n            Self::LeastOrbits =\u003e LeastOrbits::compare_quotients(left, right),\n            Self::BiggestOrbits =\u003e BiggestOrbits::compare_quotients(left, right),\n            Self::Sparsity =\u003e Sparsity::compare_quotients(left, right),\n            Self::Standard =\u003e Ordering::Less,\n        }\n    }\n}\n\nimpl FromStr for MetricUsed {\n    type Err = MetricError;\n\n    #[cfg(not(tarpaulin_include))]\n    fn from_str(s: \u0026str) -\u003e Result\u003cSelf, Self::Err\u003e {\n        if s == \"least_orbits\" {\n            Ok(Self::LeastOrbits)\n        } else if s == \"biggest_orbit\" {\n            Ok(Self::BiggestOrbits)\n        } else if s == \"sparsity\" {\n            Ok(Self::Sparsity)\n        } else if s == \"standard\" {\n            Ok(Self::Standard)\n        } else {\n            Err(MetricError(s.to_string()))\n        }\n    }\n}\n\nimpl Default for MetricUsed {\n    #[cfg(not(tarpaulin_include))]\n    fn default() -\u003e Self {\n        Self::Standard\n    }\n}\n\n#[derive(Debug, PartialEq, Eq, Clone)]\npub enum CoreMetric {\n    Recolor,\n    PowerGenerators,\n    MergeGenerators,\n}\n\nimpl FromStr for CoreMetric {\n    type Err = MetricError;\n\n    #[cfg(not(tarpaulin_include))]\n    fn from_str(s: \u0026str) -\u003e Result\u003cSelf, Self::Err\u003e {\n        match s {\n            \"recolor\" =\u003e Ok(Self::Recolor),\n            \"pow_gen\" =\u003e Ok(Self::PowerGenerators),\n            \"merge_gen\" =\u003e Ok(Self::MergeGenerators),\n            _ =\u003e Err(MetricError(s.to_string())),\n        }\n    }\n}\n\n#[derive(Debug, Default)]\npub struct Settings {\n    /// Iterate the whole powerset.\n    pub iter_powerset: bool,\n    /// Outputs orbits in dreadnaut format.\n    pub output_orbits: bool,\n    /// Log orbit sizes.\n    pub log_orbit ror,\n};\n\nuse super::{Input, ParseResult};\n\nfn parse_edge(input: Input\u003c'_\u003e) -\u003e ParseResult\u003c'_, (VertexIndex, VertexIndex)\u003e {\n    use nom::{\n        character::complete::{char, i32},\n        sequence::separated_pair,\n    };\n\n    separated_pair(i32, char(','), i32)(input)\n}\n\nfn parse_column_header(input: Input\u003c'_\u003e) -\u003e ParseResult\u003c'_, ()\u003e {\n    use nom::{character::complete::not_line_ending, combinator::value};\n\n    value((), not_line_ending)(input)\n}\n\npub fn parse_csv_input\u003cB: BufRead\u003e(graph_size: usize, input: B) -\u003e Result\u003cGraph, Error\u003e {\n    use nom::combinator::eof;\n\n    let mut graph = Graph::new_ordered(graph_size);\n    let mut lines = input.lines();\n\n    get_line_recognize!(lines, parse_column_header);\n\n    for line in lines {\n        let line = line?;\n        parse_single_line!(start_end, parse_edge(\u0026line));\n        let (start, end) = start_end;\n        graph\n            .add_edge(start, end)\n            .expect(\"Edge to non existing vertex! Graph too small!\");\n    }\n\n    Ok(graph)\n}\n\n#[cfg(test)]\nmod test {\n    use std::io::BufReader;\n\n    use crate::Error;\n\n    use super::*;\n\n    #[test]\n    fn test_parse_edge() -\u003e Result\u003c(), Error\u003e {\n        let edge = \"123,46783\";\n        let parsed = parse_edge(edge)?.1;\n        assert_eq!((123, 46783), parsed);\n\n        Ok(())\n    }\n\n    #[test]\n    fn test_parse_column_header() -\u003e Result\u003c(), Error\u003e {\n        let header = \"node_1,node_2\\n\";\n        Ok(parse_column_header(header)?.1)\n    }\n\n    #[test]\n    fn test_parse_csv_input() -\u003e Result\u003c(), Error\u003e {\n        let csv = \"node_1,node_2\n0,3\n0,1\n0,6\n1,10\n1,3\n\";\n        let buf = BufReader::new(csv.as_bytes());\n        let parsed = parse_csv_input(11, buf)?;\n\n        let mut graph = Graph::new_ordered(11);\n        graph.add_edge(0, 3)?;\n        graph.add_edge(0, 1)?;\n        graph.add_edge(0, 6)?;\n        graph.add_edge(1, 10)?;\n        graph.add_edge(1, 3)?;\n\n        assert_eq!(graph, parsed);\n\n        Ok(())\n    }\n}\n","traces":[{"line":13,"address":[1469792],"length":1,"stats":{"Line":1},"fn_name":"parse_edge"},{"line":19,"address":[1469825],"length":1,"stats":{"Line":1},"fn_name":null},{"line":22,"address":[1469920],"length":1,"stats":{"Line":1},"fn_name":"parse_column_header"},{"line":25,"address":[1469953],"length":1,"stats":{"Line":1},"fn_name":null},{"line":28,"address":[1821872,1821904,1824599,1819168],"length":1,"stats":{"Line":1},"fn_name":"parse_csv_input\u003cstd::io::buffered::bufreader::BufReader\u003cstd::fs::File\u003e\u003e"},{"line":31,"address":[1819201,1821937],"length":1,"stats":{"Line":1},"fn_name":null},{"line":32,"address":[1822002,1819374,1819266,1822109],"length":1,"stats":{"Line":2},"fn_name":null},{"line":34,"address":[1819460,1822955,1819836,1819382,1822239,1820079,1819772,1820218,1822194,1822133,1822570,1823039,1822506,1822813,1819505,1819708,1822748,1822442,1820014,1820302],"length":1,"stats":{"Line":6},"fn_name":null},{"line":36,"address":[1823180,1820479,1820137,1820329,1823066,1822871,1823208,1824392,1821666,1820447],"length":1,"stats":{"Line":4},"fn_name":null},{"line":37,"address":[1823587,1820858,1823530,1820801,1823352,1820623],"length":1,"stats":{"Line":1},"fn_name":null},{"line":38,"address":[1824164,1821327,1823722,1820933,1823502,1823658,1821262,1823987,1820773,1820997,1824248,1821522,1821438,1824052],"length":1,"stats":{"Line":4},"fn_name":null},{"line":39,"address":[1824118,1821393],"length":1,"stats":{"Line":1},"fn_name":null},{"line":40,"address":[1821613,1824339,1821412,1824137],"length":1,"stats":{"Line":2},"fn_name":null},{"line":45,"address":[1821711,1824436],"length":1,"stats":{"Line":1},"fn_name":null},{"line":57,"address":[1106185,1106176],"length":1,"stats":{"Line":3},"fn_name":"{closure#0}"},{"line":58,"address":[728417],"length":1,"stats":{"Line":1},"fn_name":null} x, DEFAULT_COLOR},\n    parse_single_line, Error,\n};\n\nuse super::{Input, ParseResult};\n\n/// The used graph generation tool writes always this header first.\n/// This only encodes that Traces should print out information which\n/// this tool doesn't need due to it using nauty/Traces as a library.\nfn parse_header\u003cI\u003e(input: \u0026mut Peekable\u003cI\u003e) -\u003e ParseResult\u003c'_, ()\u003e\nwhere\n    I: Iterator\u003cItem = Result\u003cString, std::io::Error\u003e\u003e,\n{\n    use nom::{\n        bytes::complete::tag,\n        error::{ErrorKind, VerboseError},\n        Err,\n    };\n\n    let empty_peek = |line: \u0026std::io::Result\u003cString\u003e| {\n        let line = line.as_ref();\n        if let Ok(line) = line {\n            line == \u0026\"\".to_string()\n        } else {\n            false\n        }\n    };\n    let tag_peek = |tag_name| {\n        move |line: \u0026std::io::Result\u003cString\u003e| {\n            let line = line.as_ref();\n            if let Ok(line) = line {\n                tag::\u003c\u0026str, \u0026str, ()\u003e(tag_name)(line).is_ok()\n            } else {\n                false\n            }\n        }\n    };\n    let empty_err = Err::Error(VerboseError::from_error_kind(\"\", ErrorKind::CrLf));\n    let tag_err = |tag| Err::Error(VerboseError::from_error_kind(tag, ErrorKind::Tag));\n\n    let _ = input.next_if(tag_peek(\"At\")).ok_or_else(|| tag_err(\"At\"))?;\n    let _ = input.next_if(empty_peek).ok_or(empty_err)?;\n    let _ = input.next_if(tag_peek(\"-a\")).ok_or_else(|| tag_err(\"-a\"))?;\n    let _ = input.next_if(tag_peek(\"-m\")).ok_or_else(|| tag_err(\"-m\"))?;\n\n    Ok((\"\", ()))\n}\n\n/// Parse the start line for th graph that contains the size.\nfn parse_graph_size(input: Input\u003c'_\u003e) -\u003e ParseResult\u003c'_, usize\u003e {\n    use nom::{bytes::complete::tag, character::complete::u64, error::context, sequence::tuple};\n\n    let mut size_header = context(\"Graph size header\", tuple((tag(\"n=\"), u64, tag(\" g\"))));\n    let (rest, (_, graph_size, _)) = size_header(input)?;\n    Ok((rest, graph_size as usize))\n}\n\n/// Parse a single vertex index.\nfn parse_vertex_index(input: Input\u003c'_\u003e) -\u003e ParseResult\u003c'_, VertexIndex\u003e {\n    use nom::character::complete::i32;\n    i32(input)\n}\n\n/// Parse the edges from vertex s from `s:e1 e2 e3 ... en`.\nfn parse_vertex_edges(\n    graph_size: usize,\n    input: Input\u003c'_\u003e,\n) -\u003e ParseResult\u003c'_, (VertexIndex, Vec\u003cVertexIndex\u003e)\u003e {\n    use nom::{\n        bytes::complete::tag,\n        character::complete::{space0, space1},\n        combinator::verify,\n        error::context,\n        multi::separated_list1,\n        sequence::pair,\n    };\n\n    let (input, index) = context(\"lines starts with vector index\", parse_vertex_index)(input)?;\n    let (input, _) = pair(tag(\":\"), space0)(input)?;\n\n    let (rest, edges) = context(\n        \"List of edges from this vertex\",\n        separated_list1(\n            space1,\n            verify(parse_vertex_index, |end_index| {\n                *end_index \u003c graph_size as VertexIndex \u0026\u0026 *end_index != index\n            }),\n        ),\n    )(input)?;\n\n    Ok((rest, (index, edges)))\n}\n\n/// Parse the end of a edge line which determines\n/// if the edge_lines stop early (`.`) or continues (`;`).\nfn parse_continue_after_edge_line(input: Input\u003c'_\u003e) -\u003e ParseResult\u003c'_, bool\u003e {\n    use nom::{\n        branch::alt, bytes::complete::tag, character::complete::space0, combinator::map,\n        sequence::preceded,\n    };\n\n    let edge_list_end = preceded(space0, alt((tag(\";\"), tag(\".\"))));\n    let mut should_continue_after_line = map(edge_list_end, |end: \u0026str| end == \";\");\n\n    should_continue_after_line(input)\n}\n\n/// Parse the colouring (i.e. the partition of the vertices). The input looks like this:\n/// `f=[c11,c12.c13,...c1n|c21,c22,...c2m|...|cp1,cp2,...,cpk]`\n/// Not specified vertices stay in colour DEFAULT_COLOR.\n/// Also checks, that there is nothing of relevance after the colouring.\nfn parse_colouring(graph_size: usize, input: Input\u003c'_\u003e) -\u003e ParseResult\u003c'_, (Vec\u003cColour\u003e, Colour)\u003e {\n    use nom::{\n        bytes::complete::tag,\n        character::complete::{multispace1, space0},\n        combinator::opt,\n        multi::{separated_list0, separated_list1},\n        sequence::tuple,\n    };\n\n    let mut colours = vec![DEFAULT_COLOR; graph_size];\n    let mut colour_counter = 1;\n\n    let sep = |sep_tag| tuple((space0, tag(sep_tag), space0));\n\n    let single_colour = separated_list1(sep(\",\"), parse_vertex_index);\n    let mut colour_list = separated_list0(sep(\"|\"), single_colour);\n\n    let (input, _) = tag(\"f=[\")(input)?;\n    let (input, colour_list) = colour_list(input)?;\n    let (rest, _) = tuple((tag(\"]\"), opt(tag(\" x o\")), opt(multispace1)))(input)?;\n\n    for colour in colour_list {\n        for vertex in colour {\n            colours[vertex as usize] = colour_counter;\n        }\n        colour_counter += 1;\n    }\n\n    Ok((rest, (colours, colour_counter)))\n}\n\npub fn parse_dreadnaut_input\u003cB: BufRead\u003e(input: B) -\u003e Result\u003c(Graph, bool), Error\u003e {\n    use nom::combinator::eof;\n\n    let mut lines = input.lines().peekable();\n\n    let header = parse_header(\u0026mut lines).is_ok();\n    get_line_parse!(lines, graph_size, parse_graph_size);\n\n    let mut graph = Graph::new_ordered(graph_size);\n\n    loop {\n        get_line!(line, lines);\n        let (res, vertex_edges) = parse_vertex_edges(graph_size, \u0026line)?;\n        let (vertex, edges) = vertex_edges;\n\n        for end in edges {\n            graph.add_edge(vertex, end)?;\n        }\n\n        parse_single_line!(should_continue, parse_continue_after_edge_line(res));\n\n        if !should_continue || vertex as usize \u003e= graph_size - 1 {\n            break;\n        }\n    }\n\n    get_line!(color_line, lines);\n    parse_single_line!(colours, parse_colouring(graph_size, \u0026color_line));\n    let (colours, max_colour) = colours;\n    graph.set_colours(\u0026colours)?;\n    graph.update_max_color(max_colour);\n\n    Ok((graph, header))\n}\n\n#[cfg(test)]\nmod test {\n    use std::io::BufReader;\n\n    use super::*;\n\n    #[test]\n    fn test_parse_header() -\u003e Result\u003c(), Error\u003e {\n        let test_input = \"At\n\n-a\n-m\n\";\n        let test_buf = BufReader::new(test_input.as_bytes());\n        let mut test_lines = test_buf.lines().peekable();\n        Ok(parse_header(\u0026mut test_lines)?.1)\n    }\n\n    #[test]\n    fn test_parse_graph_size() -\u003e Result\u003c(), Error\u003e {\n        let test_size = 128;\n\n        let valid_input = format!(\"n={} g\\n\", test_size);\n        let (_, parsed_size) = parse_graph_size(\u0026valid_input)?;\n        assert_eq!(test_size, parsed_size);\n\n        let non_ternary_input = \"n=0xfa g\\n\";\n        assert!(parse_graph_size(non_ternary_input).is_err());\n\n        let leading_zeros_input = format!(\"n=0000{} g\\n\", test_size);\n        let (_, parsed_size) = parse_graph_size(\u0026leading_zeros_input)?;\n        assert_eq!(test_size, parsed_size);\n\n        Ok(())\n    }\n\n    #[test]\n    fn test_parse_vertex_index() -\u003e Result\u003c(), Error\u003e {\n        let test_index = 15632;\n\n        let test_input = format!(\"{}\", test_index);\n        let (_, parsed_index) = parse_vertex_index(\u0026test_input)?;\n        assert_eq!(test_index, parsed_index);\n\n        let negative_input = format!(\"-{}\", test_index);\n        let (_, negative_parsed_index) = parse_vertex_index(\u0026negative_input)?;\n        assert_eq!(-test_index, negative_parsed_index);\n\n        Ok(())\n    }\n\n    #[test]\n    fn test_parse_vertex_edges() -\u003e Result\u003c(), Error\u003e {\n        let test_input = \"12345:12 2 0 12 34235 88 23 ;\";\n        let test_size = i32::MAX;\n\n        let (_, (vertex, edges)) = parse_vertex_edges(test_size as usize, test_input)?;\n        assert_eq!(12345, vertex);\n        assert_eq!(vec![12, 2, 0, 12, 34235, 88, 23], edges);\n\n        Ok(())\n    }\n\n    #[test]\n    fn test_parse_continue_after_edge_line() -\u003e Result\u003c(), Error\u003e {\n        let continue_input = \"      ;\\n\";\n        let (_, parsed_flag) = parse_continue_after_edge_line(continue_input)?;\n        assert!(parsed_flag);\n\n        let quit_input = \" .\\n \";\n        let (_, parsed_flag) = parse_continue_after_edge_line(quit_input)?;\n        assert!(!parsed_flag);\n\n        Ok(())\n    }\n\n    #[test]\n    fn test_parse_colouring() -\u003e Result\u003c(), Error\u003e {\n        let test_input = \"f=[1|  0  ,  3 | 2] x o\\n\\n\";\n        let (_, (parsed_colours, max_colour)) = parse_colouring(5, test_input)?;\n        assert_eq!(4, max_colour);\n        assert_eq!(vec![2, 1, 3, 2, DEFAULT_COLOR], parsed_colours);\n\n        Ok(())\n    }\n\n    #[test]\n    fn test_parse_dreadnaut_input() -\u003e Result\u003c(), Error\u003e {\n        let test_file = \"At\n\n-a\n-m\nn=4 g\n0:1 2 ;\n2:3;\n3:0.\nf=[0|1, 2] x o\n\n        \";\n        let test_buf = BufReader::new(test_file.as_bytes());\n        let mut expected_graph = Graph::new_ordered(4);\n        expected_graph.add_edge(0, 1)?;\n        expected_graph.add_edge(0, 2)?;\n        expected_graph.add_edge(2, 3)?;\n        expected_graph.add_edge(3, 0)?;\n        expected_graph.set_colours(\u0026vec![1, 2, 2, DEFAULT_COLOR])?;\n        expected_graph.update_max_color(3);\n\n        let (parsed_graph, has_header) = parse_dreadnaut_input(test_buf)?;\n        assert_eq!(expected_graph, parsed_graph);\n        assert!(has_header);\n\n        Ok(())\n    }\n\n    #[test]\n    fn test_parse_dreadnaut_input_wo_header() -\u003e Result\u003c(), Error\u003e {\n        let test_file = \"n=4 g\n0:1 2 ;\n2:3;\n3:0.\nf=[0|1, 2] \n\n        \";\n        let ype BinParseResult\u003c'a, O\u003e = nom::IResult\u003cBinInput\u003c'a\u003e, O, BinParseError\u003c'a\u003e\u003e;\n\nfn _parse_comment(input: BinInput\u003c'_\u003e) -\u003e BinParseResult\u003c'_, ()\u003e {\n    use nom::{\n        character::complete::{char, line_ending, not_line_ending},\n        combinator::value,\n        error::context,\n        multi::many_till,\n        sequence::terminated,\n    };\n\n    context(\n        \"MUS Comment line\",\n        value(\n            (),\n            terminated(char('c'), many_till(not_line_ending, line_ending)),\n        ),\n    )(input)\n}\n\nfn _parse_unsat(input: BinInput\u003c'_\u003e) -\u003e BinParseResult\u003c'_, ()\u003e {\n    use nom::{\n        bytes::complete::tag, character::complete::line_ending, combinator::value, error::context,\n        sequence::pair,\n    };\n\n    context(\n        \"MUS UNSAT result line\",\n        value((), pair(tag(\"s UNSATISFIABLE\"), line_ending)),\n    )(input)\n}\n\nfn _parse_clause_number(input: BinInput\u003c'_\u003e) -\u003e BinParseResult\u003c'_, usize\u003e {\n    use nom::{\n        bytes::complete::tag,\n        character::complete::{line_ending, u64},\n        combinator::map,\n        error::context,\n        sequence::{preceded, terminated},\n    };\n\n    context(\n        \"MUS core clause line\",\n        map(\n            terminated(preceded(tag(\"v \"), u64), line_ending),\n            |clause| clause as usize,\n        ),\n    )(input)\n}\n\n/// Parse output of picomus and return core as clause indices.\npub fn _parse_mus(input: BinInput\u003c'_\u003e) -\u003e Result\u003cVec\u003cusize\u003e, Error\u003e {\n    use nom::{\n        branch::alt,\n        combinator::eof,\n        error::context,\n        multi::{fold_many0, many1},\n    };\n\n    let uninteresting = alt((_parse_comment, _parse_unsat));\n    let mut skip = context(\n        \"Comment and UNSAT lines\",\n        fold_many0(uninteresting, || (), |_, _| ()),\n    );\n\n    let mut core_clauses = context(\"Clauses in core\", many1(_parse_clause_number));\n\n    let (res, _) = skip(input)?;\n    let (res, mut core) = core_clauses(res)?;\n    eof::\u003cBinInput\u003c'_\u003e, BinParseError\u003c'_\u003e\u003e(res)?;\n\n    let last = core.pop();\n    assert_eq!(\n        last,\n        Some(0),\n        \"Last core clause not 0! Picomus output not complete!\"\n    );\n    Ok(core)\n}\n\n#[cfg(test)]\nmod test {\n    use super::*;\n\n    #[test]\n    fn test_parse_comment() -\u003e Result\u003c(), Error\u003e {\n        let comment = b\"c whatever is written here, I don't really care lul \\n\";\n\n        _parse_comment(comment)?;\n\n        Ok(())\n    }\n\n    #[test]\n    fn test_parse_unsat() -\u003e Result\u003c(), Error\u003e {\n        let unsat = b\"s UNSATISFIABLE\\n\";\n\n        _parse_unsat(unsat)?;\n\n        Ok(())\n    }\n\n    #[test]\n    fn test_parse_clause_number() -\u003e Result\u003c(), Error\u003e {\n        let clause = b\"v 131\\n\";\n\n        let (_, clause_number) = _parse_clause_number(clause)?;\n        assert_eq!(131, clause_number);\n\n        let clause = b\"v 0\\n\";\n\n        let (_, clause_number) = _parse_clause_number(clause)?;\n        assert_eq!(0, clause_number);\n\n        Ok(())\n    }\n\n    #[test]\n    fn test_parse_mus() -\u003e Result\u003c(), Error\u003e {\n        let mus = b\"c [picomus] WARNING: no output file given\ns UNSATISFIABLE\nc [picomus] computed MUS of size 17 out of 814 (2%)\nv 20\nv 36\nv 80\nv 96\nv 156\nv 158\nv 168\nv 170\nv 650\nv 652\nv 669\nv 671\nv 680\nv 700\nv 707\nv 725\nv 734\nv 0\n\";\n\n        let clauses = _parse_mus(mus)?;\n        let expected_clauses = vec![\n            20, 36, 80, 96, 156, 158, 168, 170, 650, 652, 669, 671, 680, 700, 707, 725, 734,\n        ];\n\n        assert_eq!(expected_clauses, clauses);\n        Ok(())\n    }\n}\n","traces":[{"line":9,"address":[915184],"length":1,"stats":{"Line":1},"fn_name":"_parse_comment"},{"line":27,"address":[915344],"lengt \n\n    let comment_line_parser = tuple((char('#'), not_line_ending));\n    value((), comment_line_parser)(input)\n}\n\nfn parse_edge(input: Input\u003c'_\u003e) -\u003e ParseResult\u003c'_, (VertexIndex, VertexIndex)\u003e {\n    use nom::{\n        character::complete::{i32, multispace1},\n        sequence::{pair, terminated},\n    };\n\n    pair(terminated(i32, multispace1), i32)(input)\n}\n\npub fn parse_txt_input\u003cB: BufRead\u003e(input: B) -\u003e Result\u003cGraph, Error\u003e {\n    use nom::combinator::eof;\n\n    let mut lines = input.lines().peekable();\n\n    get_line_recognize!(lines, parse_meaningless_comment);\n    get_line_recognize!(lines, parse_meaningless_comment);\n    get_line_parse!(lines, graph_size, parse_size_comment);\n    get_line_recognize!(lines, parse_meaningless_comment);\n\n    let mut graph = Graph::new_ordered(graph_size);\n\n    for line in lines {\n        let line = line?;\n        parse_single_line!(start_end, parse_edge(\u0026line));\n        let (start, end) = start_end;\n\n        graph\n            .add_edge(start, end)\n            .expect(\"Edge to non existing vertex! Graph too small!\");\n    }\n\n    Ok(graph)\n}\n\n#[cfg(test)]\nmod test {\n    use std::io::BufReader;\n\n    use crate::Error;\n\n    use super::*;\n\n    #[test]\n    fn test_parse_size_comment() -\u003e Result\u003c(), Error\u003e {\n        let comment = \"# Nodes: 18772 Edges: 396160\\n\";\n        let (_, parsed) = parse_size_comment(comment)?;\n        assert_eq!(18772, parsed);\n\n        Ok(())\n    }\n\n    #[test]\n    fn test_parse_meaningless_comment() -\u003e Result\u003c(), Error\u003e {\n        let comment = \"# Directed graph (each unordered pair of nodes is saved once):\\n\";\n        Ok(parse_meaningless_comment(comment)?.1)\n    }\n\n    #[test]\n    fn test_parse_txt_input() -\u003e Result\u003c(), Error\u003e {\n        let txt = \"# Directed graph (each unordered pair of nodes is saved once): CA-AstroPh.txt \n# Collaboration network of Arxiv Astro Physics category (there is an edge if authors coauthored at least one paper)\n# Nodes: 6 Edges: 396160\n# FromNodeId\tToNodeId\n0\t1\n2\t3\n1\t4\n2\t5\n\";\n        let buf = BufReader::new(txt.as_bytes());\n        let mut graph = Graph::new_ordered(6);\n        graph.add_edge(0, 1)?;\n        graph.add_edge(2, 3)?;\n        graph.add_edge(1, 4)?;\n        graph.add_edge(2, 5)?;\n\n        let parsed = parse_txt_input(buf)?;\n\n        assert_eq!(graph, parsed);\n\n        Ok(())\n    }\n}\n","traces":[{"line":15,"address":[1144064],"length":1,"stats":{"Line":1},"fn_name":"parse_size_comment"},{"line":23,"address":[1144107],"length":1,"stats":{"Line":1},"fn_name":null},{"line":24,"address":[1144175],"length":1,"stats":{"Line":1},"fn_name":null},{"line":25,"address":[1144263],"length":1,"stats":{"Line":1},"fn_name":null},{"line":27,"address":[1449968,1449984],"length":1,"stats":{"Line":3},"fn_name":"{closure#0}"},{"line":30,"address":[1144464],"length":1,"stats":{"Line":1},"fn_name":"parse_meaningless_comment"},{"line":37,"address":[1144498],"length":1,"stats":{"Line":1},"fn_name":null},{"line":38,"address":[1144541],"length":1,"stats":{"Line":1},"fn_name":null},{"line":41,"address":[1144608],"length":1,"stats":{"Line":1},"fn_name":"parse_edge"},{"line":47,"address":[1144641],"length":1,"stats":{"Line":1},"fn_name":null},{"line":50,"address":[1460150,1455068,1455104,1450000],"length":1,"stats":{"Line":1},"fn_name":"parse_txt_input\u003cstd::io::buffered::bufreader::BufReader\u003c\u0026[u8]\u003e\u003e"},{"line":53,"address":[1455121,1450017],"length":1,"stats":{"Line":1},"fn_name":null},{"line":55,"address":[1450391,1450932,1455216,1455618,1455861,1450762,1450117,1455490,1450848,1455554,1450188,1455796,1450519,1455944,1456028,1450697,1450455,1455287],"length":1,"stats":{"Line":5},"fn_name":null},{"line":56,"address":[1451626,1456393,1456071,1450975,1456571,1451188,1456636,1456284,1451475,1451540,1451297,1450836,1456803,1456719,1455932,1451710]," pute_cycles();\n        new\n    }\n\n    /// Builds a new permutation form the given cycles.\n    /// The cycles need not contain single element cycles as well.\n    pub fn from_cycles(cycles: Vec\u003cVec\u003cVertexIndex\u003e\u003e, size: usize) -\u003e Self {\n        let mut raw = (0..size as VertexIndex).collect_vec();\n\n        for cycle in cycles.iter().filter(|cycle| cycle.len() \u003e 1) {\n            Self::from_cycle(cycle, \u0026mut raw);\n        }\n\n        let cycles = cycles.into_iter().filter(|cycle| cycle.len() \u003e 1).collect();\n\n        Permutation {\n            raw,\n            cycles: Some(cycles),\n        }\n    }\n\n    /// Standard composition of permutations where the right\n    /// permutation is applied first (i.e. the inner one).\n    ///\n    /// (x . y)(a) = x(y(a))\n    pub fn compose(left: \u0026Self, right: \u0026Self) -\u003e Result\u003cSelf, IncompatiblePermutationSizes\u003e {\n        if left.len() != right.len() {\n            return Err(IncompatiblePermutationSizes);\n        }\n\n        let mut compositum = Permutation {\n            cycles: None,\n            ..right.clone()\n        };\n        compositum.compose_with(left)?;\n\n        Ok(compositum)\n    }\n\n    pub fn merge(self, other: Self) -\u003e Result\u003cSelf, IncompatiblePermutationSizes\u003e {\n        Self::compose(\u0026other, \u0026self)\n    }\n\n    /// Composes another permutation with this permutation.\n    /// The other permutation is the subsequent one.\n    ///\n    /// In-place version of [`Permutation::compose`].\n    pub fn compose_with(\n        \u0026mut self,\n        subsequent_perm: \u0026Self,\n    ) -\u003e Result\u003c(), IncompatiblePermutationSizes\u003e {\n        if self.len() != subsequent_perm.len() {\n            return Err(IncompatiblePermutationSizes);\n        }\n\n        for value in self.raw.iter_mut() {\n            let self_index: usize = *value as usize;\n            let subsequent_value = subsequent_perm.get(self_index).unwrap();\n            *value = *subsequent_value;\n        }\n\n        Ok(())\n    }\n\n    #[cfg(test)]\n    pub fn nth_power(\u0026mut self, n: usize) {\n        let self_copy = self.clone();\n\n        for _ in 1..n {\n            self.compose_with(\u0026self_copy).unwrap();\n        }\n    }\n\n    pub fn nth_power_of(\u0026self, n: usize) -\u003e Self {\n        let mut self_copy = self.clone();\n\n        for _ in 1..n {\n            self_copy.compose_with(self).unwrap();\n        }\n\n        self_copy\n    }\n\n    #[cfg(test)]\n    pub fn _nth_power_mod(\u0026mut self, mut n: usize) {\n        let order = self.get_order();\n        n %= order;\n        self.nth_power(n);\n    }\n\n    #[cfg(test)]\n    pub fn nth_power_of_mod(\u0026self, mut n: usize) -\u003e Self {\n        let mut self_copy = self.clone();\n\n        let order = self_copy.get_order();\n        n %= order;\n\n        for _ in 1..n {\n            self_copy.compose_with(self).unwrap();\n        }\n\n        self_copy\n    }\n\n    pub fn len(\u0026self) -\u003e usize {\n        self.raw.len()\n    }\n\n    /// Computes the order of the permutation. This is the same as the size\n    /// of the subgroup generated by this permutation.\n    /// The order is the least common multiple of all cycle lengths as each\n    /// cycle has a period of its own length.\n    #[cfg(test)]\n    pub fn get_order(\u0026mut self) -\u003e usize {\n        if self.cycles.is_none() {\n            self.compute_cycles();\n        }\n\n        match \u0026self.cycles {\n            Some(cycles) =\u003e {\n                let mut size = 1;\n\n                for cycle in cycles.iter() {\n                    size = size.lcm(\u0026cycle.len());\n                }\n\n                size\n            }\n            None =\u003e unreachable!(),\n        }\n    }\n\n    /// Evaluate the permutation for a single value.\n    pub fn evaluate(\u0026self, in_value: \u0026VertexIndex) -\u003e Option\u003cVertexIndex\u003e {\n        self.get(*in_value as usize).copied()\n    }\n\n    /// Apply the permutation to the given iterator.\n    pub fn _apply\u003cI\u003e(self, iterator: I) -\u003e impl Iterator\u003cItem = VertexIndex\u003e\n    where\n        I: Iterator\u003cItem = VertexIndex\u003e,\n    {\n        iterator.map(move |value| self.evaluate(\u0026value).unwrap_or(value))\n    }\n\n    pub fn get_cycles(\u0026mut self) -\u003e Vec\u003cVec\u003cVertexIndex\u003e\u003e {\n        if self.cycles.is_none() {\n            self.compute_cycles();\n        }\n\n        self.cycles.clone().unwrap()\n    }\n\n    fn get(\u0026self, index: usize) -\u003e Option\u003c\u0026VertexIndex\u003e {\n        self.raw.get(index)\n    }\n\n    fn from_cycle(cycle: \u0026[VertexIndex], raw: \u0026mut [VertexIndex]) {\n        let first = cycle.get(0).unwrap();\n        let mut last = first;\n\n        for current in cycle[1..].iter() {\n            *raw.get_mut(*last as usize).unwrap() = *current;\n            last = current;\n        }\n        *raw.get_mut(*last as usize).unwrap() = *first;\n    }\n\n    fn normalize_cycle(cycle: \u0026mut [VertexIndex]) {\n        let min_index = cycle.iter().position_min_by_key(|\u0026x| *x as usize).unwrap();\n        cycle.rotate_left(min_index);\n    }\n\n    fn get_cycle(\u0026self, from: VertexIndex) -\u003e Vec\u003cVertexIndex\u003e {\n        let mut cycle = vec![from];\n\n        let mut value = self.get(from as usize).unwrap();\n\n        loop {\n            if value != \u0026from {\n                cycle.push(*value);\n                value = self.get(*value as usize).unwrap();\n            } else {\n                break;\n            }\n        }\n\n        Self::normalize_cycle(\u0026mut cycle);\n        cycle\n    }\n\n    fn compute_cycles(\u0026mut self) {\n        let mut cycles = Vec::new();\n\n        for (index, value) in self.raw.iter().enumerate() {\n            if index != *value as usize\n                \u0026\u0026 !cycles\n ine":336,"address":[683711,683905],"length":1,"stats":{"Line":2},"fn_name":null},{"line":340,"address":[684593,684096],"length":1,"stats":{"Line":3},"fn_name":"from_cycles_test"},{"line":341,"address":[684113],"length":1,"stats":{"Line":1},"fn_name":null},{"line":342,"address":[684608],"length":1,"stats":{"Line":1},"fn_name":null},{"line":343,"address":[684683],"length":1,"stats":{"Line":1},"fn_name":null},{"line":344,"address":[684989,684835],"length":1,"stats":{"Line":1},"fn_name":null},{"line":348,"address":[685913,685056],"length":1,"stats":{"Line":3},"fn_name":"test_nth_power"},{"line":349,"address":[685063],"length":1,"stats":{"Line":1},"fn_name":null},{"line":350,"address":[685187],"length":1,"stats":{"Line":1},"fn_name":null},{"line":352,"address":[685345],"length":1,"stats":{"Line":1},"fn_name":null},{"line":353,"address":[685480,685594,685360],"length":1,"stats":{"Line":2},"fn_name":null},{"line":355,"address":[685656,685496],"length":1,"stats":{"Line":2},"fn_name":null},{"line":356,"address":[685673],"length":1,"stats":{"Line":1},"fn_name":null},{"line":357,"address":[685839,685688,685808],"length":1,"stats":{"Line":2},"fn_name":null},{"line":361,"address":[688878,685936],"length":1,"stats":{"Line":3},"fn_name":"test_nth_power_of"},{"line":362,"address":[685943],"length":1,"stats":{"Line":1},"fn_name":null},{"line":364,"address":[686084],"length":1,"stats":{"Line":1},"fn_name":null},{"line":365,"address":[686099,686234,686400],"length":1,"stats":{"Line":2},"fn_name":null},{"line":367,"address":[686293,686462],"length":1,"stats":{"Line":2},"fn_name":null},{"line":368,"address":[686640,686490],"length":1,"stats":{"Line":2},"fn_name":null},{"line":370,"address":[686773],"length":1,"stats":{"Line":1},"fn_name":null},{"line":371,"address":[686908,687058],"length":1,"stats":{"Line":2},"fn_name":null},{"line":373,"address":[687191],"length":1,"stats":{"Line":1},"fn_name":null},{"line":374,"address":[687326,687464],"length":1,"stats":{"Line":2},"fn_name":null},{"line":376,"address":[687591],"length":1,"stats":{"Line":1},"fn_name":null},{"line":377,"address":[687861,687723],"length":1,"stats":{"Line":2},"fn_name":null},{"line":379,"address":[687986],"length":1,"stats":{"Line":1},"fn_name":null},{"line":380,"address":[688180,688042],"length":1,"stats":{"Line":2},"fn_name":null},{"line":382,"address":[688318],"length":1,"stats":{"Line":1},"fn_name":null},{"line":383,"address":[688557],"length":1,"stats":{"Line":1},"fn_name":null}],"covered":161,"coverable":180},{"path":["/","__w","dqg","dqg","src","quotient.rs"],"content":"//! Functionalities to build quotient graphs from\n//! a set of generators and manage the orbits.\n\nuse custom_debug_derive::Debug;\nuse itertools::{Either, Itertools, MinMaxResult};\nuse libffi::high::{ClosureMut2, ClosureMut3, ClosureMut6};\nuse nauty_Traces_sys::{\n    allgroup, densenauty, groupautomproc, grouplevelproc, groupptr, makecosetreps, optionblk,\n    orbjoin, sparsenauty, statsblk, Traces, TracesStats, FALSE, TRUE,\n};\nuse std::{os::raw::c_int, slice::from_raw_parts, usize};\n\nuse crate::{\n    debug::print_generator,\n    do_if_some,\n    encoding::QuotientGraphEncoding,\n    graph::{Graph, NautyGraph, SparseNautyGraph, TracesGraph, Vertex, VertexIndex, DEFAULT_COLOR},\n    permutation::Permutation,\n    Error, NautyTraces, Settings,\n};\n\npub type Orbits = Vec\u003cVertexIndex\u003e;\n\n/// Call nauty with the given graph representation\n/// and compute the generators of the automorphism group\n/// for the graph. Return the generators.\npub fn compute_generators_with_nauty(\n    nauty_graph: Either\u003cNautyGraph, SparseNautyGraph\u003e,\n    settings: \u0026mut Settings,\n) -\u003e Vec\u003cPermutation\u003e {\n    let mut generators = Vec::new();\n    let (n, m);\n    let mut options;\n\n    match nauty_graph {\n        Either::Left(ref dense_nauty_graph) =\u003e {\n            let nm = dense_nauty_graph.graph_repr_sizes();\n            n = nm.0;\n            m = nm.1;\n            options = optionblk::default();\n        }\n        Either::Right(ref sparse_nauty_graph) =\u003e {\n            n = sparse_nauty_graph.partition.len();\n            m = 0;\n            options = optionblk::default_sparse();\n        }\n    }\n\n    options.schreier = TRUE;\n\n    if settings.colored_graph {\n        options.defaultptn = FALSE;\n    }\n\n    let mut stats = statsblk::default();\n    let mut orbits = vec![0_i32; n];\n\n    // Limit how long the closure can reference generators so that we can return it afterwards.\n    {\n        // Callback that copies the current generator.\n        let mut userautomproc =\n            |_count, generator_ptr: *mut c_int, _orbits, _numorbits, _stabvertex, n: c_int| {\n                let mut generator = Vec::with_capacity(n as usize);\n                let generator_raw = unsafe { from_raw_parts(generator_ptr, n as usize) };\n\n                for vertex in generator_raw {\n                    generator.push(*vertex);\n                }\n\n                generators.push(Permutation::new(generator));\n            };\n        let userautomproc = ClosureMut6::new(\u0026mut userautomproc);\n\n        options.userautomproc = Some(*userautomproc.code_ptr());\n\n        // Safety: Call to nauty library function that computes\n        // the automorphism group generator through useratomproc.\n        match nauty_graph {\n            Either::Left(mut dense_nauty_graph) =\u003e unsafe {\n                densenauty(\n                    dense_nauty_graph.adjacency_matrix.as_mut_ptr(),\n                    dense_nauty_graph.vertex_order.as_mut_ptr(),\n                    dense_nauty_graph.partition.as_mut_ptr(),\n                    orbits.as_mut_ptr(),\n                    \u0026mut options,\n                    \u0026mut stats,\n                    m as c_int,\n                    n as c_int,\n                    std::ptr::null_mut(),\n                );\n            },\n            Either::Right(mut sparse_nauty_graph) =\u003e unsafe {\n                sparsenauty(\n                    \u0026mut (\u0026mut sparse_nauty_graph.sparse_graph).into(),\n                    sparse_nauty_graph.vertex_order.as_mut_ptr(),\n                    sparse_nauty_graph.partition.as_mut_ptr(),\n                    orbits.as_mut_ptr(),\n                    \u0026mut options,\n                    \u0026mut stats,\n                    std::ptr::null_mut(),\n                );\n            },\n        }\n    }\n\n    do_if_some(settings.get_stats(), |statsistics| {\n        statsistics.log_group_size(stats.grpsize1, stats.grpsize2)\n    });\n\n    generators\n}\n\n/// Call Traces with the given graph representation\n/// and compute the generators of the automorphism group\n/// for the graph. Return the generators.\npub fn compute_generators_with_traces(\n    mut traces_graph: TracesGraph,\n    settings: \u0026mut Settings,\n) -\u003e Vec\u003cPermutation\u003e {\n    let n = traces_graph.vertex_order.len();\n    let mut generators = Vec::new();\n\n    // Limit how long the closure can reference generators so that we can return it afterwards.\n    {\n        // Callback that copies the current generator.\n        let mut userautomproc = |_count, generator_ptr: *mut c_int, n: c_int| {\n            let mut generator = Vec::with_capacity(n as usize);\n            let generator_raw = unsafe { from_raw_parts(generator_ptr, n as usize) };\n\n            for vertex in generator_raw {\n                generator.push(*vertex);\n            }\n\n            generators.push(Permutation::new(generator));\n        };\n        let userautomproc = ClosureMut3::new(\u0026mut userautomproc);\n\n        let mut options = nauty_Traces_sys::TracesOptions {\n            userautomproc: Some(*userautomproc.code_ptr()),\n            ..Default::default()\n        };\n        if settings.colored_graph {\n            options.defaultptn = FALSE;\n        }\n\n        let mut stats = TracesStats::default();\n        let mut orbits = vec![0_i32; n];\n\n        // Safety: Call to Traces library function that computes\n        // the automorphism group generators through useratomproc.\n        unsafe {\n            Traces(\n                \u0026mut (\u0026mut traces_graph.sparse_graph).into(),\n                traces_graph.vertex_order.as_mut_ptr(),\n                traces_graph.partition.as_mut_ptr(),\n                orbits.as_mut_ptr(),\n                \u0026mut options,\n                \u0026mut stats,\n                std::ptr::null_mut(),\n            );\n        }\n\n        do_if_some(settings.get_stats(), |statsistics| {\n            statsistics.log_group_size(stats.grpsize1, stats.grpsize2)\n        });\n    }\n\n    generators\n}\n\npub fn compute_generators(graph: \u0026mut Graph, settings: \u0026mut Settings) -\u003e Vec\u003cPermutation\u003e {\n    match settings.nauyt_or_traces {\n        NautyTraces::Nauty =\u003e {\n            let nauty_graph = NautyGraph::from_graph(graph);\n\n            debug_assert!(nauty_graph.check_valid());\n            compute_generators_with_nauty(Either::Left(nauty_graph), settings)\n        }\n        NautyTraces::SparseNauty =\u003e {\n            let sparse_nauty_graph = SparseNautyGraph::from_graph(graph);\n            compute_generators_with_nauty(Either::Right(sparse_nauty_graph), settings)\n        }\n        NautyTraces::Traces =\u003e {\n            let traces_graph = TracesGraph::from_graph(graph);\n            compute_generators_with_traces(traces_graph, settings)\n        }\n    }\n}\n\n#[cfg(not(tarpaulin_include))]\npub fn search_group(graph: \u0026mut Graph, mut nauty_graph: NautyGraph, settings: \u0026mut Settings) {\n    let generators = compute_generators_with_nauty(Either::Left(nauty_graph.clone()), settings);\n\n    for generator in generators {\n        print!(\"Generator: \");\n        print_generator(generator);\n    }\n\n    // First, call nauty to compute the group.\n    let (n, m) = nauty_graph.graph_repr_sizes();\n    let mut options = optionblk::default();\n\n    if settings.colored_graph {\n        options.defaultptn = FALSE;\n    }\n\n    let mut stats = statsblk::default();\n    let mut orbits = vec![0_i32; n];\n\n    // Set custom group generating methods.\n    options.userautomproc = Some(groupautomproc);\n    options.userlevelproc = Some(grouplevelproc);\n\n    unsafe {\n        densenauty(\n            nauty_graph.adjacency_matrix.as_mut_ptr(),\n            nauty_graph.vertex_order.as_mut_ptr(),\n            nauty_graph.partition.as_mut_ptr(),\n            orbits.as_mut_ptr(),\n            \u0026mut options,\n            \u0026mut stats,\n            m as c_int,\n            n as c_int,\n            std::ptr::null_mut(),\n        );\n    }\n\n    // Don't forget to sort. Otherwise, the encoding will be wrong.\n    graph.sort();\n\n    // Then search in the group.\n    let mut handle_automorphism = |autom_ptr: *mut c_int, n: c_int| {\n        let mut automorphism = Vec::with_capacity(n as usize);\n        let automorphism_raw = unsafe { from_raw_parts(autom_ptr, n as usize) };\n\n        for vertex in automorphism_raw {\n            automorphism.push(*vertex);\n        }\n\n        let quotient = QuotientGraph::from_automorphism(graph, \u0026mut automorphism);\n        let formula = crate::encoding::encode_problem(\u0026quotient, graph);\n\n        if let Some((formula, _)) = formula {\n            let descriptive = crate::sat_solving::solve(formula);\n\n            if let Ok(true) = descriptive {\n                print!(\"Descriptive induced by \");\n                print_generator(Permutation::new_with_cycles(automorphism));\n            } else {\n                print!(\"Nondescriptive induced by \");\n                print_generator(Permutation::new_with_cycles(automorphism));\n            }\n        } else {\n            print!(\"Automorphism induced trivially descriptive: \");\n            print_generator(Permutation::new_with_cycles(automorphism));\n        }\n    };\n    let handle_automorphism = ClosureMut2::new(\u0026mut handle_automorphism);\n\n    unsafe {\n        let group = groupptr(TRUE);\n        if group.is_null() {\n            panic!(\"The group ptr is null!\");\n        }\n        makecosetreps(group);\n        allgroup(group, Some(*handle_automorphism.code_ptr()));\n    }\n}\n\n// Apply a generator to the current orbits and combine those,\n// the the generator connects. Does not change the generator\n// (the \u0026mut is for FFI reasons only, will not write into it).\nfn apply_generator(generator: \u0026mut [VertexIndex], orbits: \u0026mut Orbits) {\n    debug_assert_eq!(generator.len(), orbits.len());\n\n    // Safety: Call to nauty library function that reads from the generator\n    // and combines orbits accordingly. There probably is no nicer way to do this.\n    unsafe {\n        orbjoin(\n            orbits.as_mut_ptr(),\n            generator.as_mut_ptr(),\n            generator.len() as c_int,\n        );\n    }\n}\n\npub fn empty_orbits(number_vertices: usize) -\u003e Orbits {\n    let mut orbits = Vec::with_capacity(number_vertices);\n\n    for vertex in 0..number_vertices {\n        orbits.push(vertex as VertexIndex);\n    }\n\n    orbits\n}\n\nfn get_orbit(orbits: \u0026[VertexIndex], vertex: VertexIndex) -\u003e VertexIndex {\n    *orbits\n        .get(vertex as usize)\n        .expect(\"Vertex not part of given orbits!\")\n}\n\n// Generate the orbits of a quotient graph from the generators of the original graph.\npub fn generate_orbits(generators: \u0026mut [Permutation]) -\u003e Orbits {\n    let number_of_vertices = generators\n        .get(0)\n        .expect(\"Empty subset can't be used to generate orbits\")\n        .len();\n    let mut orbits = empty_orbits(number_of_vertices);\n\n    for generator in generators {\n        apply_generator(\u0026mut generator.raw, \u0026mut orbits);\n    }\n\n    orbits\n}\n\n/// Represents a quotient graph where the vertices are\n/// orbits. It also holds the reference to which original\n/// vertices are part of which orbit.\n#[derive(Debug)]\npub struct QuotientGraph {\n    pub quotient_graph: Graph,\n    #[debug(skip)]\n    pub orbits: Orbits,\n}\n\nimpl QuotientGraph {\n    #[cfg(not(tarpaulin_include))]\n    fn from_automorphism(graph: \u0026Graph, automorphism: \u0026mut [VertexIndex]) -\u003e Self {\n        let mut orbits = empty_orbits(graph.size());\n        apply_generator(automorphism, \u0026mut orbits);\n        Self::from_graph_orbits(graph, orbits)\n    }\n\n    /// Generates the quotient graph where each orbit is represented\n    /// by the vertex with the smallest index in the orbit.\n    pub fn from_graph_orbits(graph: \u0026Graph, orbits: Orbits) -\u003e Self {\n        let unique_orbits = orbits\n            .iter()\n            .unique()\n            .copied()\n            .collect::\u003cVec\u003cVertexIndex\u003e\u003e();\n\n        let mut quotient_graph;\n\n        // We don't need to search for edges if there can't be any.\n        if unique_orbits.len() \u003e 1 {\n            quotient_graph = Graph::new_with_indices(\u0026unique_orbits, true);\n            // Add edges between the orbits if single vertices in these are\n            // connected by an edge. Doesn't add edges within the same orbit.\n            graph.iterate_edges().for_each(|(start, end)| {\n                let start_orbit = get_orbit(\u0026orbits, start);\n                let end_orbit = get_orbit(\u0026orbits, end);\n                if start_orbit != end_orbit {\n                    quotient_graph\n                        .add_arc(start_orbit, end_orbit)\n                        .expect(\"Orbits not found in quotient graph!\");\n                }\n            });\n\n            // Edges between orbits might be generated more often than once.\n            quotient_graph.minimize();\n        } else {\n            quotient_graph = Graph::new_ordered(1);\n            quotient_graph\n                .set_vertex(Vertex::new(0, DEFAULT_COLOR))\n                .expect(\"Single vertex could not be added!\");\n        }\n\n        QuotientGraph {\n            quotient_graph,\n            orbits,\n        }\n    }\n\n    pub fn get_orbit_sizes(\u0026self) -\u003e (usize, usize) {\n        let mut counter = vec![0usize; self.orbits.len()];\n        self.orbits\n            .iter()\n            .for_each(|orbit| counter[*orbit as usize] += 1);\n        match counter.iter().filter(|size| **size \u003e 0).minmax() {\n            MinMaxResult::NoElements =\u003e (0, 0),\n            MinMaxResult::OneElement(m) =\u003e (*m, *m),\n            MinMaxResult::MinMax(min, max) =\u003e (*min, *max),\n        }\n    }\n\n    #[cfg(not(tarpaulin_include))]\n    pub fn search_non_descriptive_core(self, graph: \u0026Graph) -\u003e Option\u003cQuotientGraphEncoding\u003e {\n        use crate::encoding::{\n            EdgeEncoding, HighLevelEncoding, SATEncoding, SATEncodingDictionary,\n        };\n        use rayon::prelude::*;\n        let QuotientGraphEncoding(quotient_edges, orbits) = self.encode_high();\n\n        orbits\n            .iter()\n            .cloned()\n            .combinations(4) // From observations it seemed that such cores are mostly of size 4.\n            .par_bridge()\n            .find_map_any(|orbit_subset| {\n                let mut dict = SATEncodingDictionary::default();\n                let edge_subset = quotient_edges\n                    .iter()\n                    .filter(|edge| {\n                        let (start, end) = edge.get_edge();\n                        orbit_subset.iter().any(|(orbit, _)| *orbit == start)\n                            \u0026\u0026 orbit_subset.iter().any(|(orbit, _)| *orbit == end)\n                    })\n                    .copied()\n                    .collect::\u003cVec\u003cEdgeEncoding\u003e\u003e();\n\n                let descriptive_constraint_encoding =\n                    QuotientGraphEncoding(edge_subset.clone(), orbit_subset.clone())\n                        .encode_sat(\u0026mut dict, graph);\n\n                let transversal_encoding = orbit_subset\n                    .iter()\n                    .flat_map(|orbit| orbit.encode_sat(\u0026mut dict, graph));\n\n                if !crate::solve(\n                    transversal_encoding.chain(descriptive_constraint_encoding.into_iter()),\n                )\n                .unwrap()\n                {\n                    Some(QuotientGraphEncoding(edge_subset, orbit_subset))\n                } else {\n                    None\n                }\n            })\n    }\n\n    pub fn induced_subquotient(\u0026self, orbit_subset: \u0026[VertexIndex]) -\u003e Result\u003cSelf, Error\u003e {\n        let mut sub_orbits = self.orbits.clone();\n        sub_orbits.iter_mut().for_each(|orbit| {\n            if orbit_subset.binary_search(orbit).is_err() {\n                *orbit = -1;\n            }\n        });\n\n        Ok(QuotientGraph {\n            quotient_graph: self.quotient_graph.induce_subgraph(orbit_subset, true)?,\n            orbits: sub_orbits,\n        })\n    }\n}\n\n#[cfg(test)]\nmod test {\n    use super::*;\n    use crate::{graph::GraphError, Error};\n\n    #[test]\n    fn test_from_graph_orbits() -\u003e Result\u003c(), Error\u003e {\n        let mut graph = Graph::new_ordered(8);\n        graph.add_edge(0, 1)?;\n        graph.add_edge(0, 3)?;\n        graph.add_edge(0, 4)?;\n        graph.add_edge(1, 2)?;\n        graph.add_edge(1, 5)?;\n        graph.add_edge(2, 3)?;\n        graph.add_edge(2, 6)?;\n        graph.add_edge(3, 7)?;\n        graph.add_edge(4, 5)?;\n        graph.add_edge(4, 7)?;\n        graph.add_edge(5, 6)?;\n        graph.add_edge(6, 7)?;\n\n        let orbits = vec![0, 1, 2, 1, 4, 0, 1, 0];\n\n        let quotient = QuotientGraph::from_graph_orbits(\u0026graph, orbits.clone());\n        assert_eq!(orbits, quotient.orbits);\n\n        let mut expected_vert0 = Vertex::new(0, DEFAULT_COLOR);\n        expected_vert0.add_edge(1);\n        expected_vert0.add_edge(4);\n        let mut expected_vert1 = Vertex::new(1, DEFAULT_COLOR);\n        expected_vert1.add_edge(0);\n        expected_vert1.add_edge(2);\n        let mut expected_vert2 = Vertex::new(2, DEFAULT_COLOR);\n        expected_vert2.add_edge(1);\n        let mut expected_vert4 = Vertex::new(4, DEFAULT_COLOR);\n        expected_vert4.add_edge(0);\n\n        assert_eq!(4, quotient.quotient_graph.size());\n        assert_eq!(expected_vert0, *quotient.quotient_graph.get_vertex(0)?);\n        assert_eq!(expected_vert1, *quotient.quotient_graph.get_vertex(1)?);\n        assert_eq!(expected_vert2, *quotient.quotient_graph.get_vertex(2)?);\n        assert_eq!(expected_vert4, *quotient.quotient_graph.get_vertex(4)?);\n\n        // Single orbit\n        let graph = Graph::new_ordered(1);\n        let orbits = vec![0];\n\n        let quotient = QuotientGraph::from_graph_orbits(\u0026graph, orbits.clone());\n        assert_eq!(orbits, quotient.orbits);\n        assert_eq!(\n            Vertex::new(0, DEFAULT_COLOR),\n            *quotient.quotient_graph.get_vertex(0)?\n        );\n        assert_eq!(1, quotient.quotient_graph.size());\n\n        Ok(())\n    }\n\n    #[test]\n    fn test_apply_generator() {\n        let mut orbits = empty_orbits(7);\n        let mut generator = [0, 1, 4, 3, 2, 6, 5];\n\n        apply_generator(\u0026mut generator, \u0026mut orbits);\n\n        assert_eq!(orbits, [0, 1, 2, 3, 2, 5, 5]);\n    }\n\n    #[test]\n    fn test_generate_orbits() {\n        let mut generators = vec![\n            vec![5, 1, 2, 6, 4, 0, 3, 7].into(),\n            vec![0, 3, 2, 1, 4, 7, 6, 5].into(),\n        ];\n        let orbits = generate_orbits(\u0026mut generators);\n        assert_eq!(orbits, vec![0, 1, 2, 1, 4, 0, 1, 0]);\n    }\n\n    #[test]\n    fn test_compute_generators_with_dense_nauty() -\u003e Result\u003c(), GraphError\u003e {\n        let mut settings = Settings {\n            colored_graph: true,\n            ..Default::defa convert::TryInto,\n    fs::File,\n    process::{Command, Stdio},\n    sync::Arc,\n};\n\nuse flussab_cnf::cnf::Parser;\nuse itertools::Itertools;\nuse kissat_rs::{Assignment, Solver};\nuse num::ToPrimitive;\n\nuse crate::{\n    debug::write_formula_dimacs,\n    encoding::{\n        encode_problem, Clause, HighLevelEncoding, QuotientGraphEncoding, SATEncodingDictionary,\n    },\n    graph::{Graph, VertexIndex},\n    parser::_parse_mus,\n    quotient::QuotientGraph,\n    Error,\n};\n\npub fn solve(formula: impl Iterator\u003cItem = Clause\u003e) -\u003e Result\u003cbool, Error\u003e {\n    Solver::decide_formula(formula).map_err(Error::from)\n}\n\nfn get_transversal(\n    assignment: HashMap\u003ci32, Option\u003cAssignment\u003e\u003e,\n    dict: SATEncodingDictionary,\n) -\u003e Vec\u003c(VertexIndex, VertexIndex)\u003e {\n    let mut picked = dict\n        .destroy()\n        .into_iter()\n        .enumerate()\n        .filter(|(literal, _)| {\n            matches!(\n                assignment.get(\u0026(literal.to_i32().unwrap())),\n                Some(Some(Assignment::True))\n            )\n        })\n        .map(|(_, orbit_vertex)| orbit_vertex)\n        .collect_vec();\n    picked.sort_unstable_by(|(orbit1, _), (orbit2, _)| orbit1.cmp(orbit2));\n    picked\n}\n\n#[cfg(not(tarpaulin_include))]\npub fn solve_validate(\n    formula: impl Iterator\u003cItem = Clause\u003e,\n    dict: SATEncodingDictionary,\n) -\u003e Result\u003cOption\u003cVec\u003c(VertexIndex, VertexIndex)\u003e\u003e, Error\u003e {\n    let assignment = Solver::solve_formula(formula).map_err(Error::from)?;\n    Ok(assignment.map(|assignment| get_transversal(assignment, dict)))\n}\n\nfn _get_core_orbits_indexed(\n    clause_indices: \u0026[usize],\n    formula: \u0026[Clause],\n    dict: SATEncodingDictionary,\n) -\u003e Vec\u003cVertexIndex\u003e {\n    let core_formula = clause_indices\n        .iter()\n        .map(|index| {\n            formula\n                .get(index - 1)\n                .expect(\"Clause index out of range!\")\n                .clone()\n        })\n        .collect_vec();\n    get_core_orbits(\u0026core_formula, dict)\n}\n\nfn get_core_orbits(core_formula: \u0026[Clause], dict: SATEncodingDictionary) -\u003e Vec\u003cVertexIndex\u003e {\n    let mut core_orbits = Vec::new();\n    let raw_dict = dict.destroy();\n\n    for clause in core_formula {\n        for variable in clause {\n            let orbit = raw_dict\n                .get::\u003cusize\u003e(\n                    variable\n                        .abs()\n                        .try_into()\n                        .expect(\"Could not transform literal to usize!\"),\n                )\n                .expect(\"Variable not in dict!\")\n                .0;\n            core_orbits.push(orbit);\n        }\n    }\n\n    core_orbits.sort_unstable();\n    core_orbits.dedup();\n\n    core_orbits\n}\n\n#[cfg(not(tarpaulin_include))]\npub fn _solve_mus(\n    formula: impl Iterator\u003cItem = Clause\u003e,\n    quotient_graph: \u0026QuotientGraph,\n    graph: \u0026Graph,\n    dict: SATEncodingDictionary,\n) -\u003e Result\u003cOption\u003cQuotientGraphEncoding\u003e, Error\u003e {\n    let formula_collected = formula.collect_vec();\n\n    if Solver::decide_formula(formula_collected.iter().cloned())? {\n        Ok(None)\n    } else {\n        let mut mus = Command::new(\"picomus\")\n            .stdin(Stdio::piped())\n            .stdout(Stdio::piped())\n            .spawn()?;\n        let mut stdin = mus.stdin.take().expect(\"Failed to open stdin to picomus!\");\n\n        let variable_number = dict.variable_number();\n        let formula_arc = Arc::new(formula_collected);\n        let closure_formula_arc = formula_arc.clone();\n        std::thread::spawn(move || {\n            write_formula_dimacs(\u0026mut stdin, \u0026closure_formula_arc, variable_number)\n                .expect(\"Failed to write to stdin of picomus!\")\n        });\n        let mus_out = mus.wait_with_output()?;\n\n        // 20 for Unsatisfiable\n        if mus_out.status.code() == Some(20) {\n            let core = _parse_mus(\u0026mus_out.stdout)?;\n            let core_orbits = _get_core_orbits_indexed(\u0026core, \u0026formula_arc, dict);\n            dbg!(\u0026core_orbits);\n            let sub_quotient = quotient_graph.induced_subquotient(\u0026core_orbits)?;\n\n            // Make sure that the found orbits are in fact a non-descriptive core.\n            // I don't really doubt picmus, but who knows what kind of MUS it finds.\n            let (formula, _) = encode_problem(\u0026sub_quotient, graph).unwrap();\n            assert!(matches!(solve(formula), Ok(false)));\n\n            Ok(Some(sub_quotient.encode_high()))\n        } else {\n            Ok(None)\n        }\n    }\n}\n\n#[cfg(not(tarpaulin_include))]\npub fn solve_mus_kitten(\n    formula: impl Iterator\u003cItem = Clause\u003e,\n    quotient_graph: \u0026QuotientGraph,\n    graph: \u0026Graph,\n    dict: SATEncodingDictionary,\n) -\u003e Result\u003cOption\u003cQuotientGraphEncoding\u003e, Error\u003e {\n    let formula_collected = formula.collect_vec();\n\n    if Solver::decide_formula(formula_collected.iter().cloned())? {\n        Ok(None)\n    } else {\n        let mut dqg_file = File::create(\"./dqg.cnf\")?;\n        let variable_number = dict.variable_number();\n        write_formula_dimacs(\u0026mut dqg_file, \u0026formula_collected, variable_number)?;\n\n        let mut kitten = Command::new(\"./kitten\")\n            .arg(\"-O25\")\n            .arg(\"./dqg.cnf\")\n            .arg(\"./core.cnf\")\n            .stdout(Stdio::piped())\n            .spawn()?;\n        let kitten_exit = kitten.wait()?;\n\n        // 20 for Unsatisfiable\n        if kitten_exit.code() == Some(20) {\n            let core_file = File::open(\"./core.cnf\")?;\n            let mut core_parser = Parser::from_read(core_file, true).unwrap();\n            let mut core: Vec\u003cVec\u003cVertexIndex\u003e\u003e = Vec::new();\n\n            loop {\n                let next = core_parser.next_clause().unwrap();\n                match next {\n                    Some(clause) =\u003e core.push(clause.to_vec()),\n                    None =\u003e break,\n                }\n            }\n\n            let core_orbits = get_core_orbits(\u0026core, dict);\n            let sub_quotient = quotient_graph.induced_subquotient(\u0026core_orbits)?;\n\n            // Make sure that the found orbits are in fact a non-descriptive core.\n            // I don't really doubt picmus, but who knows what kind of MUS it finds.\n            let (formula, _) = encode_problem(\u0026sub_quotient, graph).unwrap();\n            assert!(matches!(solve(formula), Ok(false)));\n\n            Ok(Some(sub_quotient.encode_high()))\n        } else {\n            Ok(None)\n        }\n    }\n}\n\n#[cfg(test)]\nmod test {\n    use crate::{encoding::encode_problem, graph::Graph, quotient::QuotientGraph};\n\n    use super::*;\n\n    #[test]\n    fn test_non_descriptive() -\u003e Result\u003c(), Error\u003e {\n        //0-1-2-3, where 1 and 2 are in the same (fake) orbit.\n        let mut graph = Graph::new_ordered(4);\n        graph.add_edge(0, 1)?;\n        graph.add_edge(1, 2)?;\n        graph.add_edge(2, 3)?;\n        let colors = vec![1, 2, 2, 3];\n        graph.set_colours(\u0026colors)?;\n\n        // Not the actual orbits, but used to check for non-descriptiveness.\n        let fake_orbits = vec![0, 1, 1, 3];\n        let quotient = QuotientGraph::from_graph_orbits(\u0026graph, fake_orbits);\n\n        let formula = encode_problem(\u0026quotient, \u0026graph);\n\n        let result = solve(formula.unwrap().0);\n        assert!(result.is_ok());\n        assert_eq!(false, result.unwrap());\n\n        Ok(())\n    }\n\n    #[test]\n    fn test_get_transversal() {\n        // Orbit 1: {0,1}\n        // orbit 2: {2,3}\n        // Edges: 0-2,1-3\n        // Transversal: 0|-\u003e0,2|-\u003e3\n\n        let mut assignment = HashMap::new();\n        assignment.insert(1, Some(Assignment::True));\n        assignment.insert(2, Some(Assignment::False));\n        assignment.insert(3, Some(Assignment::True));\n        assignment.insert(4, Some(Assignment::False));\n\n        let mut dict = SATEncodingDictionary::default();\n        assert_eq!(1, dict.lookup_pairing(0, 0));\n        assert_eq!(2, dict.lookup_pairing(0, 1));\n        assert_eq!(3, dict.lookup_pairing(2, 3));\n        assert_eq!(4, dict.lookup_pairing(2, 2));\n\n        let expected_transversal = vec![(0, 0), (2, 3)];\n        assert_eq!(expected_transversal, get_transversal(assignment, dict));\n    }\n\n    #[test]\n    fn test_get_core_orbits_indexed() {\n        let mut dict = SATEncodingDictionary::default();\n        let pairs = vec![\n            (14, 14),\n            (14, 34),\n            (22, 22),\n            (22, 26),\n            (134, 144),\n            (134, 134),\n            (154, 154),\n            (154, 158),\n            (127, 127),\n        ];\n        for (index, (orbit, vertex)) in pairs.into_iter().enumerate() {\n            assert_eq!(index as VertexIndex + 1, dict.lookup_pairing(orbit, vertex));\n        }\n\n        let formula = vec![vec![1, 2], vec![-1, -2], vec![3, 4], vec![-3, -4], vec![9]];\n        let core = vec![1, 3, 5];\n\n        let expected_orbits = vec![14, 22, 127];\n\n        assert_eq!(\n            expected_orbits,\n            _get_core_orbits_indexed(\u0026core, \u0026formula, dict)\n        );\n    }\n}\n","traces":[{"line":25,"address":[827056,826976],"length":1,"stats":{"Line":1},"fn_name":"solve\u003ccore::iter::adapters::chain::Chain\u003ccore::iter::adapters::flatten::FlatMap\u003ccore::slice::iter::Iter\u003c(i32, alloc::vec::Vec\u003ci32, alloc::alloc::Global\u003e)\u003e, alloc::vec::Vec\u003calloc::vec::Vec\u003ci32, alloc::alloc::Global\u003e, alloc::alloc::Global\u003e, dqg::quotient::{impl#0}::search_non_descriptive_core::{closure#0}::{closure#1}\u003e, alloc::vec:
